.panel h3{color:#fd0;text-align:center;margin-bottom:10px;}

.mb{position:absolute;pointer-events:all;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;font-size:19px;text-shadow:0 1px 3px #000;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
.mb.on{opacity:.6;}

#bMine{right:88px;bottom:18px;width:57px;height:57px;background:rgba(155,105,10,.7);}
#bAtk{right:14px;bottom:18px;width:57px;height:57px;background:rgba(175,25,25,.7);}
#bPlace{right:158px;bottom:18px;width:50px;height:50px;background:rgba(25,65,165,.7);font-size:16px;}

<script>
'use strict';
// ━━ CONSTANTS ━━━━━━━━━━━━━━━━━━━━━━
const TS=16,WW=400,WH=200;
const T={AIR:0,GRASS:1,DIRT:2,STONE:3,WOOD:4,LEAVES:5,COAL:6,IRON:7,SAND:8,BED:10,TORCH:11,PLANK:12};
const TC={1:{a:0x5d8a3c,b:0x3d6a1c},2:{a:0xa07840,b:0x7a5820},3:{a:0x909090,b:0x686868},4:{a:0xa06030,b:0x784820},5:{a:0x3a8a2a,b:0x1a5a0a},6:{a:0x555555,b:0x333333},7:{a:0x8a8a8a,b:0xcc8844},8:{a:0xd0c080,b:0xa89840},10:{a:0x303030,b:0x181818},11:{a:0xff9900,b:0xff5500},12:{a:0xb07840,b:0x805820}};
const THP={1:2,2:3,3:8,4:5,5:1,6:10,7:12,8:2,10:9999,11:1,12:4};
const TDROP={1:'dirt',2:'dirt',3:'stone',4:'wood',5:null,6:'coal',7:'iron',8:'sand',11:'torch',12:'plank'};
const ITEMS={
  pickaxe:{name:'Pickaxe',col:0xcccccc,spd:5.5,dmg:8},ironpick:{name:'Iron Pick',col:0xddaa55,spd:9,dmg:15},
  sword:{name:'Sword',col:0x4488ff,dmg:25},ironsword:{name:'Iron Sword',col:0xddaa55,dmg:50},
  dirt:{name:'Dirt',col:0xa07840,isBlock:true,tile:2},stone:{name:'Stone',col:0x909090,isBlock:true,tile:3},
  wood:{name:'Wood',col:0xa06030,isBlock:true,tile:4},plank:{name:'Plank',col:0xb07840,isBlock:true,tile:12},
  coal:{name:'Coal',col:0x444444},iron:{name:'Iron',col:0xcc8844},
  sand:{name:'Sand',col:0xd0c080,isBlock:true,tile:8},leaves:{name:'Leaves',col:0x3a8a2a,isBlock:true,tile:5},
  torch:{name:'Torch',col:0xff9900,isBlock:true,tile:11},ironbar:{name:'Iron Bar',col:0xddaa77},
  meat:{name:'Raw Meat',col:0xdd6644,heal:20},cookedmeat:{name:'Cooked Meat',col:0xcc4422,heal:50},
  bandage:{name:'Bandage',col:0xffaaaa,heal:35},
};
const RECIPES=[
  {r:'plank',n:4,need:{wood:1},label:'Plank x4',req:'wood x1'},
  {r:'torch',n:4,need:{wood:1,coal:1},label:'Torch x4',req:'wood+coal'},
  {r:'ironbar',n:1,need:{iron:3},label:'Iron Bar',req:'iron x3'},
  {r:'ironpick',n:1,need:{ironbar:3,wood:2},label:'Iron Pick',req:'bar x3+wood x2'},
  {r:'ironsword',n:1,need:{ironbar:4,wood:1},label:'Iron Sword',req:'bar x4+wood'},
  {r:'bandage',n:2,need:{plank:4},label:'Bandage x2',req:'plank x4'},
  {r:'cookedmeat',n:1,need:{meat:1,coal:1},label:'Cooked Meat',req:'meat+coal'},
];

// ━━ HELPERS ━━━━━━━━━━━━━━━━━━━━━━━━
function lerp(a,b,t){return a+(b-a)*t;}
function rgb(r,g,b){return((r&255)<<16)|((g&255)<<8)|(b&255);}
function toast(msg,ms){
  const e=document.getElementById('toast');
  e.textContent=msg;e.style.opacity=1;
  clearTimeout(e._t);e._t=setTimeout(()=>e.style.opacity=0,ms||2500);
}

// ━━ UI ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let panelOpen=false;
const UI={
  show(id){document.getElementById(id).style.display='block';panelOpen=true;if(G)G.paused=true;},
  hide(id){document.getElementById(id).style.display='none';panelOpen=false;if(G)G.paused=false;},
  music(){
    Mus.toggle();
    document.getElementById('bMusic').textContent='♪'+(Mus.on?'ON':'OFF');
  },
  craft(){
    if(document.getElementById('craftPanel').style.display==='block'){UI.closeCraft();return;}
    const list=document.getElementById('craftList');list.innerHTML='';
    RECIPES.forEach((r,i)=>{
      const ok=G&&Object.entries(r.need).every(([k,v])=>{const s=G.slots.find(s=>s&&s.type===k);return s&&s.count>=v;});
      const d=document.createElement('div');d.className='crow';
      d.innerHTML='<div><div class="crn">'+r.label+'</div><div class="crr">'+r.req+'</div></div>'
        +'<button class="crb" '+(ok?'':'disabled')+' onclick="UI.doCraft('+i+')">Craft</button>';
      list.appendChild(d);
    });
    UI.show('craftPanel');
  },
  closeCraft(){UI.hide('craftPanel');},
  doCraft(i){
    if(!G)return;const r=RECIPES[i];
    if(!Object.entries(r.need).every(([k,v])=>{const s=G.slots.find(s=>s&&s.type===k);return s&&s.count>=v;})){toast('Not enough!');return;}
    Object.entries(r.need).forEach(([k,v])=>G.removeItem(k,v));
    G.addItem(r.r,r.n);G.refreshHB();toast('✅ '+r.label);UI.craft();
  },
  save(){
    if(document.getElementById('savePanel').style.display==='block'){UI.closeSave();return;}
    Save.render();UI.show('savePanel');
  },
  closeSave(){UI.hide('savePanel');},
  online(){
    if(document.getElementById('onlinePanel').style.display==='block'){UI.closeOnline();return;}
    Online.init();UI.show('onlinePanel');
  },
  closeOnline(){UI.hide('onlinePanel');},
};

// ━━ MUSIC ━━━━━━━━━━━━━━━━━━━━━━━━━━
const Mus={
  actx:null,on:true,itv:null,nodes:[],started:false,
  MA:['E4','D4','C4','D4','E4','E4','E4','R','D4','D4','D4','R','E4','G4','G4','R'],
  BA:['C3','R','G2','R','C3','R','G2','R','F2','R','C3','R','G2','R','D3','R'],
  nF(n){if(n==='R')return 0;const m={C:0,D:2,E:4,F:5,G:7,A:9,B:11};return 440*Math.pow(2,(m[n[0]]-9+(+n.slice(-1)-4)*12)/12);},
  start(){
    if(!this.actx)this.actx=new(window.AudioContext||window.webkitAudioContext)();
    if(this.actx.state==='suspended')this.actx.resume();
    this.stop();
    const bs=60/110,master=this.actx.createGain();master.gain.value=.18;master.connect(this.actx.destination);this.nodes.push(master);
    let mi=0,bi=0;
    const pl=(f,d,tp,v)=>{if(!f||!this.on)return;const o=this.actx.createOscillator(),g=this.actx.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,this.actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.actx.currentTime+d*.9);o.connect(g);g.connect(master);o.start();o.stop(this.actx.currentTime+d);this.nodes.push(o,g);};
    const tick=()=>{if(!this.on)return;pl(this.nF(this.MA[mi]),bs*.85,'square',.15);pl(this.nF(this.BA[bi]),bs*.9,'sawtooth',.1);mi=(mi+1)%this.MA.length;bi=(bi+1)%this.BA.length;};
    tick();this.itv=setInterval(tick,bs*1000);
  },
  stop(){if(this.itv){clearInterval(this.itv);this.itv=null;}this.nodes.forEach(n=>{try{if(n.stop)n.stop();n.disconnect();}catch(e){}});this.nodes=[];},
  toggle(){this.on=!this.on;if(this.on)this.start();else this.stop();},
  tryStart(){if(!this.started&&this.on){this.started=true;this.start();}}
};
document.addEventListener('pointerdown',()=>Mus.tryStart(),{once:true,passive:true});
document.addEventListener('touchstart',()=>Mus.tryStart(),{once:true,passive:true});

// ━━ SAVE ━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Save={
  KEY:'tf2d_v2',
  get(){try{return JSON.parse(localStorage.getItem(this.KEY))||{};}catch(e){return{};}},
  set(d){try{localStorage.setItem(this.KEY,JSON.stringify(d));}catch(e){toast('Storage full!');}},
  enc(map){const a=new Uint8Array(WW*WH);for(let x=0;x<WW;x++)for(let y=0;y<WH;y++)a[x*WH+y]=map[x][y];return btoa(String.fromCharCode(...a));},
  dec(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);const m=[];for(let x=0;x<WW;x++){m[x]=[];for(let y=0;y<WH;y++)m[x][y]=a[x*WH+y];}return m;},
  doSave(slot){
    if(!G){toast('Start game first!');return;}
    const name=prompt('Name:','Day '+G.dayNum)||'Day '+G.dayNum;
    const d=this.get();
    d[slot]={name,date:new Date().toLocaleTimeString(),day:G.dayNum,hp:G.pHP,px:Math.round(G.pC.x),py:Math.round(G.pC.y),sel:G.sel,slots:G.slots.map(s=>s?{type:s.type,count:s.count}:null),map:this.enc(G.map),surf:G.surf,dayT:G.dayT};
    this.set(d);this.render();toast('✅ Saved!');
  },
  doLoad(slot){const d=this.get()[slot];if(!d)return;window.SAVE=d;UI.closeSave();if(G)G.scene.restart();toast('Loading...');},
  doDelete(slot){if(!confirm('Delete?'))return;const d=this.get();delete d[slot];this.set(d);this.render();},
  auto(){
    if(!G||G.paused)return;const d=this.get();
    d[0]={name:'Auto',date:new Date().toLocaleTimeString(),day:G.dayNum,hp:G.pHP,px:Math.round(G.pC.x),py:Math.round(G.pC.y),sel:G.sel,slots:G.slots.map(s=>s?{type:s.type,count:s.count}:null),map:this.enc(G.map),surf:G.surf,dayT:G.dayT};
    this.set(d);
  },
  render(){
    const saves=this.get(),el=document.getElementById('saveList');el.innerHTML='';
    for(let i=1;i<=5;i++){
      const s=saves[i],div=document.createElement('div');div.className='crow';
      if(s)div.innerHTML='<div><div class="crn">📁 '+s.name+'</div><div class="crr">Day '+s.day+' '+s.date+'</div></div><div style="display:flex;gap:3px;"><button class="crb" onclick="Save.doLoad('+i+')">▶</button><button class="crb" onclick="Save.doSave('+i+')">💾</button><button class="crb" onclick="Save.doDelete('+i+')">🗑</button></div>';
      else div.innerHTML='<div class="crr">— Empty '+i+' —</div><button class="crb" onclick="Save.doSave('+i+')">💾</button>';
      el.appendChild(div);
    }
  }
};
setInterval(()=>Save.auto(),120000);

// ━━ ONLINE ━━━━━━━━━━━━━━━━━━━━━━━━━
const Online={
  peer:null,conn:null,myId:null,others:{},
  init(){
    if(this.peer)return;
    try{
      this.peer=new Peer(undefined,{debug:0});
      this.peer.on('open',id=>{
        this.myId=id;
        const el=document.getElementById('myId');
        el.textContent='Your ID: '+id+' (tap to copy)';
        el.onclick=()=>{navigator.clipboard?.writeText(id).then(()=>toast('Copied!'));};
      });
      this.peer.on('connection',c=>{this.conn=c;this.setup(c);toast('👥 Friend joined!');});
      this.peer.on('error',e=>toast('Error: '+e.type));
    }catch(e){}
  },
  connect(){
    const id=document.getElementById('peerIn').value.trim();if(!id)return;
    if(!this.peer){this.init();setTimeout(()=>this._do(id),1500);}else this._do(id);
  },
  _do(id){this.conn=this.peer.connect(id,{reliable:true});this.setup(this.conn);toast('Connecting...');},
  setup(c){
    c.on('open',()=>{toast('✅ Connected!');UI.closeOnline();});
    c.on('data',d=>{
      if(!G)return;
      if(d.t==='pos'){
        if(!this.others[d.id]){const g=G.add.graphics().setDepth(11);this.others[d.id]={g};}
        const o=this.others[d.id];o.g.clear();o.g.setPosition(d.x,d.y);
        o.g.fillStyle(0xff8888);o.g.fillRect(-6,-4,12,12);o.g.fillStyle(0xffcc88);o.g.fillRect(-5,-16,10,11);o.g.scaleX=d.f||1;
      }
      if(d.t==='blk'&&G){G.map[d.x][d.y]=d.b;G.dirtyChunk(d.x,d.y);}
    });
    c.on('close',()=>{toast('Friend left');Object.values(this.others).forEach(o=>o.g.destroy());this.others={};this.conn=null;});
  },
  pos(){if(!this.conn||!this.conn.open||!G)return;try{this.conn.send({t:'pos',id:this.myId,x:Math.round(G.pC.x),y:Math.round(G.pC.y),f:G.pFacing});}catch(e){}},
  blk(x,y,b){if(!this.conn||!this.conn.open)return;try{this.conn.send({t:'blk',x,y,b});}catch(e){}},
};

// ━━ WORLD GEN ━━━━━━━━━━━━━━━━━━━━━━
function genWorld(){
  const map=[];for(let x=0;x<WW;x++){map[x]=[];for(let y=0;y<WH;y++)map[x][y]=0;}
  const surf=[];
  for(let x=0;x<WW;x++)surf[x]=Math.round(75+Math.sin(x*.028)*10+Math.sin(x*.07+1.1)*5+Math.sin(x*.18+2.3)*3);
  for(let x=0;x<WW;x++)for(let y=0;y<WH;y++){
    if(y>=WH-1){map[x][y]=T.BED;continue;}
    if(y>surf[x]+25)map[x][y]=T.STONE;
    else if(y>surf[x])map[x][y]=T.DIRT;
    else if(y===surf[x])map[x][y]=T.GRASS;
  }
  for(let i=0;i<40;i++){let cx=(Math.random()*WW)|0,cy=(surf[cx]+15+Math.random()*60)|0,ang=Math.random()*Math.PI*2;for(let j=0,l=40+Math.random()*90;j<l;j++){ang+=(Math.random()-.5)*.9;cx+=Math.cos(ang);cy+=Math.sin(ang)*.6;const r=2+Math.random()*3;for(let dx=-r-1;dx<=r+1;dx++)for(let dy=-r-1;dy<=r+1;dy++){if(dx*dx+dy*dy>r*r)continue;const nx=(cx+dx)|0,ny=(cy+dy)|0;if(nx>1&&nx<WW-2&&ny>5&&ny<WH-2&&map[nx][ny]!==T.BED)map[nx][ny]=T.AIR;}}}
  for(let i=0;i<350;i++){const x=(1+Math.random()*(WW-2))|0,y=(surf[x]+10+Math.random()*(WH-surf[x]-15))|0;const ore=Math.random()<.6?T.COAL:T.IRON;for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){const nx=x+dx,ny=y+dy;if(nx>0&&nx<WW&&ny>0&&ny<WH&&map[nx][ny]===T.STONE&&Math.random()<.7)map[nx][ny]=ore;}}
  for(let x=5;x<WW-5;x++){if(Math.random()<.08&&map[x][surf[x]]===T.GRASS&&Math.abs(surf[x]-surf[x-1])<=2){const h=5+((Math.random()*4)|0);for(let y=surf[x]-h;y<surf[x];y++)if(y>=0)map[x][y]=T.WOOD;const lr=3+(Math.random()*2|0),lt=surf[x]-h-1;for(let dx=-lr;dx<=lr;dx++)for(let dy=-lr;dy<=lr;dy++){if(dx*dx*.6+dy*dy>lr*lr+1)continue;const lx=x+dx,ly=lt+dy;if(lx>0&&lx<WW&&ly>0&&ly<WH&&map[lx][ly]===T.AIR)map[lx][ly]=T.LEAVES;}}}
  return{map,surf};
}

// ━━ MOBILE INPUT ━━━━━━━━━━━━━━━━━━━
const joy={id:null,dx:0,dy:0};
const mb={jump:false,mine:false,atk:false,place:false};
let tapTX=0,tapTY=0;
(function setupMobile(){
  const zone=document.getElementById('joy'),knob=document.getElementById('jk'),R=44;
  function mv(id,cx,cy){if(joy.id!==id)return;const r=zone.getBoundingClientRect(),ox=r.left+r.width/2,oy=r.top+r.height/2;let dx=cx-ox,dy=cy-oy;const d=Math.sqrt(dx*dx+dy*dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}joy.dx=dx/R;joy.dy=dy/R;knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';}
  zone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joy.id=t.identifier;mv(t.identifier,t.clientX,t.clientY);},{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)mv(t.identifier,t.clientX,t.clientY);},{passive:false});
  zone.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===joy.id){joy.id=null;joy.dx=0;joy.dy=0;knob.style.transform='translate(-50%,-50%)';}});
  function mkBtn(id,k){const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();mb[k]=true;el.classList.add('on');},{passive:false});el.addEventListener('touchend',()=>{mb[k]=false;el.classList.remove('on');});el.addEventListener('touchcancel',()=>{mb[k]=false;el.classList.remove('on');});}
  mkBtn('bJump','jump');mkBtn('bMine','mine');mkBtn('bAtk','atk');mkBtn('bPlace','place');
  document.getElementById('bCr2').addEventListener('touchstart',e=>{e.preventDefault();UI.craft();},{passive:false});
  document.addEventListener('touchstart',e=>{
    if(panelOpen||!G)return;
    const t=e.touches[0];
    if(t.clientY>window.innerHeight-185)return;// ignore HUD area
    const cam=G.cameras.main,sc=G.scale;
    const rx=t.clientX*(G.scale.width/window.innerWidth);
    const ry=t.clientY*(G.scale.height/window.innerHeight);
    tapTX=Math.floor((rx+cam.scrollX)/TS);
    tapTY=Math.floor((ry+cam.scrollY)/TS);
  },{passive:true});
})();

// ━━ GAME SCENE ━━━━━━━━━━━━━━━━━━━━━
class GameScene extends Phaser.Scene{
  constructor(){super('Game');}
  create(){
    G=this;

  _lmb(wx,wy){const it=this.selItem();if(it&&(it.type==='sword'||it.type==='ironsword')){if(!this._atk(wx,wy))this._atkAnim(wx,wy);return;}const tx=Math.floor(wx/TS),ty=Math.floor(wy/TS);if(this._canMine(tx,ty)){this.mT={tx,ty};this.mProg=0;}}
  _eat(){const it=this.selItem();if(!it||!it.heal){toast(it?it.name+' not food!':'No item!');return;}if(this.pHP>=this.pMaxHP){toast('HP full!');return;}const h=Math.min(it.heal,this.pMaxHP-this.pHP);this.pHP+=h;this.removeItem(it.type,1);this.refreshHB();toast('+'+h+' HP ❤️');}
  _dayNight(dt){
    this.dayT+=dt;const dp=this.dayT/this.dayDur;const was=this.isNight;this.isNight=dp>=.571&&dp<1;
    if(this.isNight&&!was){this.waveNum=0;this.waveTimer=0;if(this.dayNum===1)toast('🌙 Night 1 — Safe!',4000);else{toast('🌙 Night '+this.dayNum+' — WAVES!',3000);this.time.delayedCall(3000,()=>this._wave());}}

    const ov=this.nightOvl;ov.clear();let na=0;if(sp>.45&&sp<.55)na=(sp-.45)/.1*.75;else if(sp>=.55&&sp<.9)na=.75;else if(sp>=.9)na=(1-sp)/.1*.75;
    if(na>0){ov.fillStyle(0x000028,na);ov.fillRect(0,0,this.scale.width,this.scale.height);}

    if(this.isNight&&this.dayNum>=2&&this.waveActive){this.waveTxt.setText('⚠️ WAVE '+this.waveNum+'!');this.waveTxt.setAlpha(.5+Math.sin(Date.now()*.006)*.5);}
    else if(this.isNight&&this.dayNum>=2){const tt=Math.max(0,Math.ceil((this.waveCooldown-this.waveTimer)/1000));this.waveTxt.setText(tt>0?'Next: '+tt+'s':'');this.waveTxt.setAlpha(1);}
    else this.waveTxt.setText('');
  }
  _wave(){this.waveNum++;this.waveActive=true;const cnt=Math.min(3+this.dayNum*2+this.waveNum*2,20);toast('⚠️ Wave '+this.waveNum+'! ('+cnt+')',3000);for(let i=0;i<cnt;i++)this.time.delayedCall(i*600,()=>{const side=Math.random()<.5?-1:1;const sx=Math.max(10,Math.min(WW*TS-10,this.pC.x+side*(280+Math.random()*200)))|0;const sy=this.surf[Math.floor(sx/TS)]||80;const r=Math.random();const type=this.dayNum<=2?(r<.5?'zombie':r<.8?'creeper':'spider'):(r<.4?'zombie':r<.7?'creeper':'spider');this.mobs.push(new Mob(this,sx,(sy-2)*TS,type));});this.time.delayedCall(cnt*600+5000,()=>this.waveActive=false);}
  _spawnAnimals(){for(let i=0;i<10;i++){const x=(20+Math.random()*(WW-40))|0;this.animals.push(new Animal(this,x*TS,(this.surf[x]-1)*TS,Math.random()<.6?'rabbit':'deer'));}}
  _atkAnim(wx,wy){if(this.atkCD>0)return false;let hit=false;this.animals.forEach(a=>{if(!a.alive)return;const dx=a.cont.x-this.pC.x,dy=a.cont.y-this.pC.y;if(Math.sqrt(dx*dx+dy*dy)<70){a.takeDmg(this.selItem()?.dmg||20);hit=true;this._hitFX(a.cont.x,a.cont.y);}});if(hit){this.atkCD=350;this.atkFlash=8;}return hit;}
  _buildBg(){const sy=75*TS,g=this.bgMtn;g.clear();g.fillStyle(0x1a3a1a,.6);g.beginPath();g.moveTo(0,sy);for(let x=0;x<=WW*TS;){const w=120+((x*7)%190),h=90+((x*3)%210);g.lineTo(x+w/2,sy-h);g.lineTo(x+w,sy);x+=w*.65;}g.closePath();g.fillPath();for(let i=0;i<20;i++){const cg=this.add.graphics().setScrollFactor(.6+Math.random()*.15).setDepth(-8);const cx=Math.random()*WW*TS,cy=25+Math.random()*200,cw=55+Math.random()*80;this._drawCloud(cg,cx,cy,cw);this.clouds.push({gfx:cg,x:cx,y:cy,w:cw,spd:.07+Math.random()*.18});}this._drawSky(0);}
  _drawSky(d){const g=this.bgSky,W=this.scale.width,H=this.scale.height;g.clear();let tR,tG,tB,bR,bG,bB;if(d<.1){const t=d/.1;tR=lerp(10,100,t);tG=lerp(10,160,t);tB=lerp(50,220,t);bR=lerp(20,180,t);bG=lerp(30,220,t);bB=lerp(80,255,t);}else if(d<.45){tR=100;tG=160;tB=220;bR=180;bG=220;bB=255;}else if(d<.55){const t=(d-.45)/.1;tR=lerp(100,40,t);tG=lerp(160,50,t);tB=lerp(220,80,t);bR=lerp(180,220,t);bG=lerp(220,120,t);bB=lerp(255,60,t);}else if(d<.65){const t=(d-.55)/.1;tR=lerp(40,5,t);tG=lerp(50,5,t);tB=lerp(80,30,t);bR=lerp(220,10,t);bG=lerp(120,20,t);bB=lerp(60,60,t);}else if(d<.85){tR=5;tG=5;tB=30;bR=10;bG=20;bB=60;}else{const t=(d-.85)/.15;tR=lerp(5,80,t);tG=lerp(5,100,t);tB=lerp(30,180,t);bR=lerp(10,160,t);bG=lerp(20,200,t);bB=lerp(60,240,t);}g.fillGradientStyle(rgb(tR,tG,tB),rgb(tR,tG,tB),rgb(bR,bG,bB),rgb(bR,bG,bB),1);g.fillRect(0,0,W,H);if(d>.55||d<.05){const a=d<.05?d/.05:d>.85?(d-.85)/.15:1;if(a>0)for(let i=0;i<80;i++){g.fillStyle(0xffffff,(.2+(i%3)*.2)*a);g.fillRect((i*137+71)%W,(i*91+43)%(H*.7),i%5===0?2:1,i%5===0?2:1);}}const ang=d*Math.PI*2-Math.PI/2,cx=W/2+Math.cos(ang)*W*.42,cy=H*.4+Math.sin(ang)*H*.38;if(d<.45||d>.88){g.fillStyle(0xFFEE44,1);g.fillCircle(cx,cy,22);g.fillStyle(0xFFEE44,.22);g.fillCircle(cx,cy,36);}else if(d>.5&&d<.85){g.fillStyle(0xdde8ff,.9);g.fillCircle(cx,cy,16);g.fillStyle(rgb(tR,tG,tB),.95);g.fillCircle(cx+7,cy-4,13);}}
  _drawCloud(g,x,y,w){g.clear();const h=w*.45;g.fillStyle(0xffffff,.72);g.fillEllipse(x,y,w,h);g.fillEllipse(x+w*.25,y-h*.35,w*.7,h*.7);g.fillEllipse(x-w*.2,y-h*.2,w*.55,h*.55);}
  _torchLight(){const g=this.lGfx;g.clear();if(!this.isNight)return;const cam=this.cameras.main;const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+2);const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+2);for(let x=tx0;x<=tx1;x++)for(let y=ty0;y<=ty1;y++)if(this.map[x][y]===T.TORCH){const px=x*TS+8,py=y*TS+8,fl=1+Math.sin(Date.now()*.008+x+y)*.08;g.fillStyle(0xffaa33,.18*fl);g.fillCircle(px,py,55*fl);g.fillStyle(0xffcc66,.25*fl);g.fillCircle(px,py,30*fl);g.fillStyle(0xffee99,.4*fl);g.fillCircle(px,py,14*fl);}g.fillStyle(0xffffff,.04);g.fillCircle(this.pC.x,this.pC.y,44);}
  _ck(cx,cy){return cx+','+cy;}
  refreshChunks(){const cam=this.cameras.main;const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+1);const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+1);const vis=new Set();for(let cx=Math.floor(tx0/this.CS);cx<=Math.floor(tx1/this.CS);cx++)for(let cy=Math.floor(ty0/this.CS);cy<=Math.floor(ty1/this.CS);cy++){const k=this._ck(cx,cy);vis.add(k);if(!this.chunks[k]){this.chunks[k]=this.add.graphics().setDepth(10);this._renderChunk(cx,cy);}}for(const k in this.chunks)if(!vis.has(k)){this.chunks[k].destroy();delete this.chunks[k];}}
  _renderChunk(cx,cy){const g=this.chunks[this._ck(cx,cy)];if(!g)return;g.clear();for(let x=cx*this.CS;x<(cx+1)*this.CS&&x<WW;x++)for(let y=cy*this.CS;y<(cy+1)*this.CS&&y<WH;y++){const t=this.map[x][y];if(!t)continue;this._tile(g,x,y,t);}}
  _tile(g,x,y,t){const c=TC[t];if(!c)return;const px=x*TS,py=y*TS;if(t===T.TORCH){g.fillStyle(0x8B4513);g.fillRect(px+7,py+5,2,9);g.fillStyle(0xff9900);g.fillCircle(px+8,py+5,4);g.fillStyle(0xffff00,.8);g.fillCircle(px+8,py+4,2);return;}g.fillStyle(c.b);g.fillRect(px,py,TS,TS);g.fillStyle(c.a);g.fillRect(px,py,TS-2,TS-2);if(t===T.GRASS){g.fillStyle(0x4aaa28);g.fillRect(px,py,TS,3);g.fillStyle(0x70cc40);for(let i=2;i<TS;i+=3)g.fillRect(px+i,py,1,2);}else if(t===T.COAL){g.fillStyle(0x222222);g.fillRect(px+3,py+3,4,4);g.fillRect(px+9,py+7,3,3);}else if(t===T.IRON){g.fillStyle(0xcc8844);g.fillRect(px+3,py+3,3,3);g.fillRect(px+9,py+8,3,3);}else if(t===T.WOOD){g.fillStyle(0x602010);g.fillRect(px+6,py,4,TS);}else if(t===T.PLANK){g.fillStyle(0x704020,.6);g.fillRect(px,py+5,TS,2);g.fillRect(px,py+11,TS,2);g.fillRect(px+8,py,2,TS);}g.fillStyle(0x000000,.18);g.fillRect(px+TS-2,py,2,TS);g.fillRect(px,py+TS-2,TS,2);}

  solid(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return true;const t=this.sc.map[tx][ty];return t!==T.AIR&&t!==9&&t!==T.LEAVES&&t!==T.TORCH;}
  los(px,py){const x0=this.cont.x,y0=this.cont.y,dx=px-x0,dy=py-y0,steps=Math.max(Math.abs(dx),Math.abs(dy))/TS;if(steps<1)return true;for(let i=1;i<steps;i++){if(this.solid(Math.floor((x0+dx*(i/steps))/TS),Math.floor((y0+dy*(i/steps))/TS)))return false;}return true;}
  _draw(){const g=this.gfx;g.clear();if(!this.alive)return;const t=Date.now();if(this.type==='zombie'){const ls=this.state==='chase'?Math.sin(t*.012)*10:0;g.fillStyle(0x223310);g.fillRect(-4,8,4,8+ls*.3);g.fillRect(1,8,4,8-ls*.3);g.fillStyle(0x334422);g.fillRect(-5,-4,10,13);g.fillStyle(0x446633);g.fillRect(this.facing>0?5:-9,-2,4,8);g.fillRect(this.facing>0?-9:5,2,4,6);g.fillStyle(0x88aa66);g.fillRect(-4,-16,8,13);g.fillStyle(0x223311);g.fillRect(-4,-16,8,4);g.fillStyle(0xff0000,.9);g.fillCircle(-1,-11,2.5);g.fillCircle(2,-11,2.5);g.scaleX=this.facing;}else if(this.type==='creeper'){const fl=this.fuseOn&&Math.sin(t*.02)>0,cc=fl?0xffffff:0x44aa22;g.fillStyle(0x2a6a1a);g.fillRect(-5,8,4,8);g.fillRect(1,8,4,8);g.fillStyle(cc);g.fillRect(-5,-4,10,13);g.fillRect(-3,-8,6,5);g.fillRect(-6,-18,12,11);g.fillStyle(0x000000);g.fillRect(-4,-16,3,3);g.fillRect(1,-16,3,3);g.fillRect(-3,-13,1,3);g.fillRect(-1,-13,2,4);g.fillRect(2,-13,1,3);if(this.fuseOn){const p=this.fuseT/2000;this.tmrGfx.clear();this.tmrGfx.fillStyle(0x000000,.6);this.tmrGfx.fillRect(-14,-42,28,8);this.tmrGfx.fillStyle(p<.5?0xffff00:0xff4400);this.tmrGfx.fillRect(-13,-41,Math.round(26*p),6);this.tmrTxt.setText('💥'+((2000-this.fuseT)/1000).toFixed(1)+'s');}else{this.tmrGfx.clear();this.tmrTxt.setText('');}}else if(this.type==='spider'){g.fillStyle(0x111111);for(let i=0;i<4;i++){g.fillRect(-12+i*2,-2,10,2);g.fillRect(2+i*2,-2,10,2);}g.fillStyle(this.col);g.fillEllipse(-3,0,10,8);g.fillStyle(0x333333);g.fillEllipse(3,-1,8,7);g.fillStyle(0xff0000);g.fillCircle(1,-3,1.5);g.fillCircle(4,-3,1.5);}const hg=this.hpGfx;hg.clear();if(this.hp<this.maxHp){const fy=-this.h-10;hg.fillStyle(0x660000);hg.fillRect(-12,fy,24,4);hg.fillStyle(0x44ff44);hg.fillRect(-12,fy,24*(this.hp/this.maxHp),4);}}
  update(dt,px,py){if(!this.alive)return;if(this.dmgCD>0)this.dmgCD-=dt;if(this.invCD>0)this.invCD-=dt;this.stateT+=dt;const dx=px-this.cont.x,dy=py-this.cont.y,dist=Math.sqrt(dx*dx+dy*dy);const los=dist<10*TS&&this.los(px,py);if(los)this.state='chase';else if(dist>12*TS)this.state='idle';if(this.type==='creeper'){if(this.state==='chase'&&dist<3*TS&&los){if(!this.fuseOn){this.fuseOn=true;this.fuseT=0;toast('🔥 Creeper!',1500);}}else if(this.fuseOn&&!los){this.fuseOn=false;this.fuseT=0;this.tmrGfx.clear();this.tmrTxt.setText('');}if(this.fuseOn){this.fuseT+=dt;if(this.fuseT>=2000)this._explode();}}const spd=this.state==='chase'?this.spd:.4;if(this.type==='spider'&&this.state==='chase'){const ang=Math.atan2(dy,dx);this.cont.x+=Math.cos(ang)*spd;this.cont.y+=Math.sin(ang)*spd;this.cont.x=Phaser.Math.Clamp(this.cont.x,0,WW*TS);this.cont.y=Phaser.Math.Clamp(this.cont.y,0,WH*TS);this.facing=dx>0?1:-1;this._draw();return;}if(this.state==='chase'){this.facing=dx>0?1:-1;this.vx=this.facing*spd;}else{if(this.stateT>2000){this.facing*=-1;this.stateT=0;}this.vx=this.facing*spd*.5;}if(this.type==='creeper'&&this.fuseOn)this.vx=0;this.vy=Math.min(this.vy+.35,16);const nnx=this.cont.x+this.vx,bx=Math.floor(nnx/TS),by=Math.floor((this.cont.y-this.h*.5)/TS),by2=Math.floor(this.cont.y/TS);if(!this.solid(bx,by)&&!this.solid(bx,by2))this.cont.x=Phaser.Math.Clamp(nnx,0,WW*TS);else{this.vx=0;this.facing*=-1;}if(this.onG&&this.solid(Math.floor((this.cont.x+this.facing*TS*1.2)/TS),Math.floor(this.cont.y/TS)))this.vy=-6.5;const nny=this.cont.y+this.vy;this.onG=false;if(!this.solid(Math.floor(this.cont.x/TS),Math.floor(nny/TS)))this.cont.y=nny;else{if(this.vy>0)this.onG=true;this.vy=0;}this._draw();}
  _explode(){if(this.exploded)return;this.exploded=true;this.alive=false;for(let i=0;i<20;i++)this.sc._breakFX(this.cont.x+(Math.random()-.5)*40,this.cont.y+(Math.random()-.5)*40,{a:0xff8800,b:0xff4400});const cx=Math.floor(this.cont.x/TS),cy=Math.floor(this.cont.y/TS);for(let dx=-3;dx<=3;dx++)for(let dy=-3;dy<=3;dy++){if(dx*dx+dy*dy>10)continue;const nx=cx+dx,ny=cy+dy;if(nx>0&&nx<WW&&ny>0&&ny<WH&&this.sc.map[nx][ny]!==T.AIR&&this.sc.map[nx][ny]!==T.BED){this.sc.map[nx][ny]=T.AIR;this.sc.dirtyChunk(nx,ny);}}const pd=Math.sqrt(Math.pow(this.sc.pC.x-this.cont.x,2)+Math.pow(this.sc.pC.y-this.cont.y,2));if(pd<3*TS){const dmg=Math.round(60*(1-pd/(3*TS)));this.sc.pHP=Math.max(1,this.sc.pHP-dmg);this.sc.pInv=500;toast('💥 Creeper! -'+dmg+'HP',3000);}this.sc.time.delayedCall(100,()=>{this.gfx.clear();this.tmrGfx.clear();this.tmrTxt.setText('');this.dead=true;});}
  takeDmg(dmg,vx,vy){if(!this.alive||this.invCD>0)return;this.hp-=dmg;this.invCD=200;if(this.hp<=0){this.alive=false;this.sc.time.delayedCall(350,()=>{this.gfx.clear();this.dead=true;});this.sc._breakFX(this.cont.x,this.cont.y,{a:this.col,b:0xcc2222});const loot={zombie:['plank','iron','meat'],creeper:['coal'],spider:['coal','iron']}[this.type]||['dirt'];this.sc._drop(this.cont.x,this.cont.y,loot[Math.floor(Math.random()*loot.length)]);if(Math.random()<.2)this.sc._drop(this.cont.x,this.cont.y,'bandage');}else{this.vx=vx||0;this.vy=vy||-3;}}
}

// ━━ ANIMAL ━━━━━━━━━━━━━━━━━━━━━━━━━
class Animal{
  constructor(sc,x,y,type){this.sc=sc;this.type=type;this.alive=true;this.dead=false;this.cont=sc.add.container(x,y).setDepth(10);this.gfx=sc.add.graphics();this.cont.add(this.gfx);this.vx=0;this.vy=0;this.onG=false;this.facing=Math.random()<.5?1:-1;this.stateT=0;this.idleT=2000+Math.random()*3000;this.moving=false;this.invCD=0;if(type==='rabbit'){this.hp=this.maxHp=15;this.col=0xddccbb;this.h=8;}else{this.hp=this.maxHp=40;this.col=0xaa8855;this.h=14;}this._draw();}
  solid(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return true;const t=this.sc.map[tx][ty];return t!==T.AIR&&t!==9&&t!==T.LEAVES&&t!==T.TORCH;}
  _draw(){const g=this.gfx;g.clear();if(!this.alive)return;if(this.type==='rabbit'){const hop=this.moving?Math.abs(Math.sin(Date.now()*.02))*4:0;g.fillStyle(this.col);g.fillEllipse(0,-hop,6,this.h);g.fillEllipse(this.facing*3,-this.h/2-hop,5,4);g.fillRect(this.facing*2-1,-this.h-5-hop,2,6);g.fillRect(this.facing*4-1,-this.h-5-hop,2,6);g.fillStyle(0xffaaaa);g.fillRect(this.facing*2,-this.h-4-hop,1,4);g.fillRect(this.facing*4,-this.h-4-hop,1,4);g.fillStyle(0x220000);g.fillCircle(this.facing*4,-this.h/2-1-hop,1.5);}else{const walk=this.moving?Math.sin(Date.now()*.012)*8:0;g.fillStyle(0x886633);g.fillRect(-5,this.h/4,3,this.h/2+walk*.3);g.fillRect(-2,this.h/4,3,this.h/2);g.fillRect(2,this.h/4,3,this.h/2);g.fillRect(5,this.h/4,3,this.h/2-walk*.3);g.fillStyle(this.col);g.fillEllipse(0,0,18,10);g.fillEllipse(this.facing*7,-this.h*.4,7,8);g.fillStyle(0x221100);g.fillCircle(this.facing*9,-this.h*.4,2);g.fillStyle(0xffffff);g.fillCircle(-this.facing*9,0,3);}if(this.hp<this.maxHp){g.fillStyle(0x660000);g.fillRect(-10,-this.h-12,20,3);g.fillStyle(0x44ff44);g.fillRect(-10,-this.h-12,20*(this.hp/this.maxHp),3);}}
  update(dt){if(!this.alive)return;if(this.invCD>0)this.invCD-=dt;this.stateT+=dt;const pdx=this.cont.x-this.sc.pC.x,pdy=this.cont.y-this.sc.pC.y,flee=Math.sqrt(pdx*pdx+pdy*pdy)<100;const spd=flee?(this.type==='rabbit'?3.5:2.5):.8;if(flee)this.facing=pdx>0?1:-1;else if(this.stateT>this.idleT){this.stateT=0;this.idleT=2000+Math.random()*3000;this.moving=!this.moving;if(this.moving)this.facing=Math.random()<.5?1:-1;}this.vx=this.moving||flee?this.facing*spd:0;this.vy=Math.min(this.vy+.35,14);const nx=this.cont.x+this.vx,bx=Math.floor(nx/TS),by=Math.floor(this.cont.y/TS),by2=Math.floor((this.cont.y-this.h)/TS);if(!this.solid(bx,by)&&!this.solid(bx,by2))this.cont.x=Phaser.Math.Clamp(nx,0,WW*TS);else{this.vx=0;this.facing*=-1;}if(this.onG&&this.solid(Math.floor((this.cont.x+this.facing*TS)/TS),Math.floor(this.cont.y/TS)))this.vy=-5;const ny=this.cont.y+this.vy;this.onG=false;if(!this.solid(Math.floor(this.cont.x/TS),Math.floor(ny/TS)))this.cont.y=ny;else{if(this.vy>0)this.onG=true;this.vy=0;}this._draw();}
  takeDmg(dmg){if(!this.alive||this.invCD>0)return;this.hp-=dmg;this.invCD=200;if(this.hp<=0){this.alive=false;this.sc.time.delayedCall(300,()=>{this.gfx.clear();this.dead=true;});this.sc._breakFX(this.cont.x,this.cont.y,{a:this.col,b:0xaa6633});const n=this.type==='deer'?3:1;for(let i=0;i<n;i++)this.sc._drop(this.cont.x+(Math.random()-.5)*20,this.cont.y,'meat');toast('🥩 Got '+n+' meat! F to eat',3000);}else{this.vx=this.facing*-4;this.vy=-3;}}
}
