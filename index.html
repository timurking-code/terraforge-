<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;touch-action:none;}

/* ── SAVE MENU ── */
#saveMenu{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:20000;align-items:center;justify-content:center;flex-direction:column;font-family:“Courier New”,monospace;}
#saveMenu.open{display:flex;}
#saveBox{background:#0d1a2a;border:2px solid #3a6aaa;border-radius:12px;padding:24px 28px;min-width:320px;max-width:92vw;}
#saveBox h2{color:#FFD700;font-size:20px;margin-bottom:14px;text-align:center;}
.saveSlot{display:flex;align-items:center;justify-content:space-between;background:#1a2a3a;border:1px solid #2a4a6a;border-radius:7px;padding:9px 12px;margin-bottom:8px;}
.saveSlot .sn{color:#aaccff;font-size:13px;}.saveSlot .si{color:#557799;font-size:11px;margin-top:2px;}
.saveSlot .sb{display:flex;gap:5px;}
.sBtn{padding:4px 9px;border-radius:5px;border:1px solid;font-family:“Courier New”,monospace;font-size:11px;cursor:pointer;}
.sBtn.lo{background:#1a3a1a;border-color:#3a7a3a;color:#aaffaa;}
.sBtn.sv{background:#1a2a5a;border-color:#3a5aaa;color:#aaccff;}
.sBtn.dl{background:#3a1a1a;border-color:#7a3a3a;color:#ffaaaa;}
#smClose{margin-top:12px;padding:7px 20px;background:#2a1a0a;border:1px solid #7a4a1a;border-radius:7px;color:#ffcc88;font-family:“Courier New”,monospace;font-size:13px;cursor:pointer;display:block;width:100%;}
#saveBtnIG{position:fixed;top:8px;left:8px;z-index:10000;padding:5px 10px;background:rgba(0,0,0,0.65);border:1px solid #3a6aaa;color:#aaccff;font-family:“Courier New”,monospace;font-size:12px;border-radius:6px;cursor:pointer;display:none;}
#musicBtn{position:fixed;top:8px;right:8px;z-index:10000;padding:5px 10px;background:rgba(0,0,0,0.65);border:1px solid #4a8a4a;color:#aaffaa;font-family:“Courier New”,monospace;font-size:12px;border-radius:6px;cursor:pointer;}

/* ── CRAFT PANEL ── */
#craftPanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d1a0d;border:2px solid #3a7a3a;border-radius:10px;padding:18px;z-index:15000;font-family:“Courier New”,monospace;min-width:280px;max-width:95vw;}
#craftPanel.open{display:block;}
#craftPanel h3{color:#FFD700;font-size:16px;margin-bottom:12px;text-align:center;}
.cRecipe{display:flex;align-items:center;justify-content:space-between;background:#1a2a1a;border:1px solid #2a5a2a;border-radius:6px;padding:7px 10px;margin-bottom:7px;cursor:pointer;}
.cRecipe:hover{background:#2a4a2a;}
.cRName{color:#aaffaa;font-size:13px;}.cRReq{color:#668866;font-size:11px;margin-top:2px;}
.cRBtn{padding:3px 10px;background:#1a4a1a;border:1px solid #3a8a3a;border-radius:4px;color:#88ff88;font-family:“Courier New”,monospace;font-size:12px;cursor:pointer;}
#craftClose{margin-top:10px;padding:6px 16px;background:#2a1a0a;border:1px solid #7a4a1a;border-radius:6px;color:#ffcc88;font-family:“Courier New”,monospace;font-size:12px;cursor:pointer;display:block;width:100%;}

#toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:#1a3a1a;border:1px solid #3a7a3a;color:#aaffaa;padding:7px 16px;border-radius:7px;font-family:“Courier New”,monospace;font-size:13px;z-index:30000;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}

/* ── MOBILE ── */
#mobileHUD{display:none;position:fixed;bottom:0;left:0;right:0;height:185px;z-index:9999;pointer-events:none;}
#mobileHUD.visible{display:block;}
#joyZone{position:absolute;left:10px;bottom:12px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.2);pointer-events:all;}
#joyKnob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(100,255,120,0.5);border:2px solid rgba(160,255,170,0.85);top:50%;left:50%;transform:translate(-50%,-50%);}
.mBtn{position:absolute;pointer-events:all;border-radius:50%;border:2px solid rgba(255,255,255,0.35);font-size:20px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;font-weight:bold;color:#fff;text-shadow:0 1px 3px #000;transition:transform .07s,opacity .07s;}
.mBtn.pressed{transform:scale(0.84);opacity:0.6;}
#btnJump{right:16px;bottom:105px;width:66px;height:66px;background:rgba(40,160,40,0.6);font-size:24px;}
#btnMine{right:95px;bottom:20px;width:60px;height:60px;background:rgba(180,120,20,0.65);}
#btnAtk{right:16px;bottom:20px;width:60px;height:60px;background:rgba(190,35,35,0.65);}
#btnCraft{right:168px;bottom:20px;width:50px;height:50px;background:rgba(60,40,120,0.65);font-size:16px;}

<div id="craftPanel"><h3>⚒ Crafting</h3><div id="recipeList"></div><button id="craftClose" onclick="closeCraft()">✕ Close</button></div>
<div id="toast"></div>

  <div id="joyZone"><div id="joyKnob"></div></div>

<script>
/* ============================================================
   TERRAFORGE v3 — Terraria-like improvements
   + Hearts HP · Full inventory · Crafting · Fall damage
   + Health regen · Night spawns · Torches · More enemies
   + Better world gen · Armor · Multiple enemy types
   ============================================================ */

const TS=16,WW=400,WH=200;

// Tile IDs
const T={AIR:0,GRASS:1,DIRT:2,STONE:3,WOOD:4,LEAVES:5,COAL:6,IRON:7,SAND:8,WATER:9,BEDROCK:10,TORCH:11,PLANK:12,BRICK:13,GLASS:14};

const TC={
  [T.GRASS]:{a:0x5d8a3c,b:0x3d6a1c},
  [T.DIRT]:{a:0xa07840,b:0x7a5820},
  [T.STONE]:{a:0x909090,b:0x686868},
  [T.WOOD]:{a:0xa06030,b:0x784820},
  [T.LEAVES]:{a:0x3a8a2a,b:0x1a5a0a},
  [T.COAL]:{a:0x606060,b:0x333333},
  [T.IRON]:{a:0x909090,b:0xcc8844},
  [T.SAND]:{a:0xd0c080,b:0xa89840},
  [T.WATER]:{a:0x2060cc,b:0x1040aa},
  [T.BEDROCK]:{a:0x303030,b:0x181818},
  [T.TORCH]:{a:0xff9900,b:0xff5500},
  [T.PLANK]:{a:0xb07840,b:0x805820},
  [T.BRICK]:{a:0x886655,b:0x664433},
  [T.GLASS]:{a:0xaaccff,b:0x8899cc},
};

const THP={[T.GRASS]:2,[T.DIRT]:3,[T.STONE]:8,[T.WOOD]:5,[T.LEAVES]:1,[T.COAL]:10,[T.IRON]:12,[T.SAND]:2,[T.WATER]:9999,[T.BEDROCK]:9999,[T.TORCH]:1,[T.PLANK]:4,[T.BRICK]:10,[T.GLASS]:3};
const TDROP={[T.GRASS]:'dirt',[T.DIRT]:'dirt',[T.STONE]:'stone',[T.WOOD]:'wood',[T.COAL]:'coal',[T.IRON]:'iron',[T.SAND]:'sand',[T.LEAVES]:null,[T.TORCH]:'torch',[T.PLANK]:'plank',[T.BRICK]:'brick',[T.GLASS]:'glass'};

// Items
const ITEMS={
  pickaxe:{name:'Pickaxe',color:0xcccccc,isBlock:false,dmg:8,spd:5.5},
  ironpick:{name:'Iron Pickaxe',color:0xddaa55,isBlock:false,dmg:15,spd:8},
  sword:{name:'Sword',color:0x4488ff,isBlock:false,dmg:25},
  ironsword:{name:'Iron Sword',color:0xddaa55,isBlock:false,dmg:45},
  dirt:{name:'Dirt',color:0xa07840,isBlock:true,tile:T.DIRT},
  stone:{name:'Stone',color:0x909090,isBlock:true,tile:T.STONE},
  wood:{name:'Wood',color:0xa06030,isBlock:true,tile:T.WOOD},
  plank:{name:'Plank',color:0xb07840,isBlock:true,tile:T.PLANK},
  brick:{name:'Brick',color:0x886655,isBlock:true,tile:T.BRICK},
  glass:{name:'Glass',color:0xaaccff,isBlock:true,tile:T.GLASS},
  coal:{name:'Coal',color:0x444444,isBlock:false},
  iron:{name:'Iron Ore',color:0xcc8844,isBlock:false},
  sand:{name:'Sand',color:0xd0c080,isBlock:true,tile:T.SAND},
  leaves:{name:'Leaves',color:0x3a8a2a,isBlock:true,tile:T.LEAVES},
  torch:{name:'Torch',color:0xff9900,isBlock:true,tile:T.TORCH},
  ironbar:{name:'Iron Bar',color:0xddaa77,isBlock:false},
  bandage:{name:'Bandage',color:0xffaaaa,isBlock:false,heal:40},
};

// Crafting recipes: {result, amount, needs:{item:count}}
const RECIPES=[
  {result:'plank',  amount:4, needs:{wood:1},        label:'Plank x4',     req:'wood x1'},
  {result:'torch',  amount:4, needs:{wood:1,coal:1},  label:'Torch x4',     req:'wood x1 + coal x1'},
  {result:'brick',  amount:2, needs:{stone:2},        label:'Brick x2',     req:'stone x2'},
  {result:'glass',  amount:2, needs:{sand:3},         label:'Glass x2',     req:'sand x3'},
  {result:'ironbar',amount:1, needs:{iron:3},         label:'Iron Bar x1',  req:'iron x3'},
  {result:'ironpick',amount:1,needs:{ironbar:3,wood:2},label:'Iron Pickaxe',req:'ironbar x3 + wood x2'},
  {result:'ironsword',amount:1,needs:{ironbar:4,wood:1},label:'Iron Sword', req:'ironbar x4 + wood x1'},
  {result:'bandage', amount:1,needs:{plank:5},        label:'Bandage x1',   req:'plank x5'},
];

function lerp(a,b,t){return a+(b-a)*t;}
function rgb(r,g,b){return((r&255)<<16)|((g&255)<<8)|(b&255);}
const IS_MOBILE=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||('ontouchstart' in window);

/* ── SAVE SYSTEM ── */
const SK='tf_saves3';
function getSaves(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function putSaves(s){localStorage.setItem(SK,JSON.stringify(s));}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200);}
function mapB64(map){const f=new Uint8Array(WW*WH);for(let x=0;x<WW;x++)for(let y=0;y<WH;y++)f[x*WH+y]=map[x][y];return btoa(String.fromCharCode(...f));}
function b64Map(b64){const bin=atob(b64),f=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)f[i]=bin.charCodeAt(i);const m=[];for(let x=0;x<WW;x++){m[x]=[];for(let y=0;y<WH;y++)m[x][y]=f[x*WH+y];}return m;}
function saveGame(slot,label){
  const sc=window.GS;if(!sc)return;
  const saves=getSaves();
  saves[slot]={label,date:new Date().toLocaleString(),px:Math.round(sc.pC.x),py:Math.round(sc.pC.y),pHP:sc.pHP,sel:sc.sel,slots:sc.slots.map(s=>s?{type:s.type,count:s.count}:null),map:mapB64(sc.map),surf:sc.surf};
  putSaves(saves);renderSlots();showToast('Saved! 💾');
}
function renderSlots(){
  const saves=getSaves(),list=document.getElementById('slotList');list.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=saves[i],d=document.createElement('div');d.className='saveSlot';
    if(s)d.innerHTML=`<div><div class="sn">📁 ${s.label}</div><div class="si">${s.date} · HP:${s.pHP}</div></div><div class="sb"><button class="sBtn lo" onclick="doLoad(${i})">▶</button><button class="sBtn sv" onclick="doSave(${i})">💾</button><button class="sBtn dl" onclick="doDel(${i})">🗑</button></div>`;
    else d.innerHTML=`<div><div class="sn" style="color:#446644">— Empty Slot ${i} —</div></div><div class="sb"><button class="sBtn sv" onclick="doSave(${i})">💾 Save</button></div>`;
    list.appendChild(d);
  }
}
function doSave(i){const l=prompt('Name:',`Slot ${i}`)||`Slot ${i}`;saveGame(i,l);}
function doLoad(i){const d=getSaves()[i];if(!d)return;window.PL=d;closeSaveMenu();const sc=window.PG.scene.getScene('Game');if(sc&&sc.scene.isActive())sc.scene.restart();else window.PG.scene.start('Game');}
function doDel(i){if(confirm('Delete?')){const s=getSaves();delete s[i];putSaves(s);renderSlots();}}
function openSaveMenu(){if(window.GS)window.GS.paused=true;renderSlots();document.getElementById('saveMenu').classList.add('open');}
function closeSaveMenu(){document.getElementById('saveMenu').classList.remove('open');if(window.GS)window.GS.paused=false;}

/* ── CRAFTING UI ── */
function openCraft(){
  if(window.GS)window.GS.paused=true;
  const sc=window.GS;
  const list=document.getElementById('recipeList');list.innerHTML='';
  RECIPES.forEach((r,i)=>{
    const canCraft=sc?Object.entries(r.needs).every(([k,v])=>{const sl=sc.slots.find(s=>s&&s.type===k);return sl&&sl.count>=v;}):false;
    const d=document.createElement('div');d.className='cRecipe';
    d.innerHTML=`<div><div class="cRName">${r.label}</div><div class="cRReq">${r.req}</div></div><button class="cRBtn" ${canCraft?'':'disabled style="opacity:.4"'} onclick="doCraft(${i})">Craft</button>`;
    list.appendChild(d);
  });
  document.getElementById('craftPanel').classList.add('open');
}
function closeCraft(){document.getElementById('craftPanel').classList.remove('open');if(window.GS)window.GS.paused=false;}
function doCraft(i){
  const sc=window.GS;if(!sc)return;
  const r=RECIPES[i];
  const can=Object.entries(r.needs).every(([k,v])=>{const sl=sc.slots.find(s=>s&&s.type===k);return sl&&sl.count>=v;});
  if(!can){showToast('Not enough materials!');return;}
  Object.entries(r.needs).forEach(([k,v])=>sc.removeItem(k,v));
  sc.addItem(r.result,r.amount);
  sc.refreshHB();
  showToast(`Crafted: ${r.label}! ✅`);
  openCraft(); // refresh
}

/* ── MUSIC ── */
let audioCtx=null,musicOn=true,musicInterval=null,musicNodes=[];
const MA=['E4','D4','C4','D4','E4','E4','E4','R','D4','D4','D4','R','E4','G4','G4','R','E4','D4','C4','D4','E4','E4','E4','E4','D4','D4','E4','D4','C4','R','R','R'];
const MB=['C4','E4','G4','E4','C4','G3','A3','B3','C4','E4','G4','A4','G4','E4','D4','C4','F3','A3','C4','E4','D4','B3','G3','E3','C3','E3','G3','C4','B3','G3','E3','C3'];
const BA=['C3','R','G2','R','C3','R','G2','R','F2','R','C3','R','G2','R','D3','R','C3','R','G2','R','C3','R','G2','R','F2','R','G2','R','C2','R','R','R'];
const BB=['C2','R','G2','R','F2','R','C3','R','G2','R','D3','R','C3','R','G2','R','F2','R','C3','R','G2','R','D3','R','C2','R','G2','R','C3','R','G2','R'];
function nF(n){if(n==='R')return 0;const nm={C:0,D:2,E:4,F:5,G:7,A:9,B:11};const o=parseInt(n.slice(-1)),s=nm[n[0]];return 440*Math.pow(2,(s-9+(o-4)*12)/12);}
function startMusic(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  stopMusic();
  const bs=60/110;let mi=0,bi=0,mt=0,bt=0;
  const master=audioCtx.createGain();master.gain.value=0.18;master.connect(audioCtx.destination);musicNodes.push(master);
  const M=[MA,MB],B=[BA,BB];
  function play(f,d,type,v){if(!f||!musicOn)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d*.88);o.connect(g);g.connect(master);o.start();o.stop(audioCtx.currentTime+d);musicNodes.push(o,g);}
  function tick(){if(!musicOn)return;play(nF(M[mt][mi]),bs*.85,'square',0.15);play(nF(B[bt][bi]),bs*.9,'sawtooth',0.1);if(nF(M[mt][mi])&&Math.random()<.25)play(nF(M[mt][mi])*1.5,bs*.6,'triangle',0.05);mi=(mi+1)%M[mt].length;bi=(bi+1)%B[bt].length;if(mi===0)mt=(mt+1)%M.length;if(bi===0)bt=(bt+1)%B.length;}
  tick();musicInterval=setInterval(tick,bs*1000);
}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null;}musicNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect();}catch(e){}});musicNodes=[];}
function toggleMusic(){musicOn=!musicOn;document.getElementById('musicBtn').textContent='♪ '+(musicOn?'ON':'OFF');if(musicOn)startMusic();else stopMusic();}
let _ms=false;function tryM(){if(!_ms&&musicOn){_ms=true;startMusic();}}
['pointerdown','touchstart','keydown'].forEach(e=>document.addEventListener(e,tryM,{once:true}));

/* ── WORLD GEN ── */
function genWorld(){
  const map=[];for(let x=0;x<WW;x++)map[x]=new Array(WH).fill(T.AIR);
  const surf=[];
  for(let x=0;x<WW;x++)surf[x]=Math.round(75+Math.sin(x*.028)*10+Math.sin(x*.07+1.1)*5+Math.sin(x*.18+2.3)*3+Math.sin(x*.4+.7)*1.5);
  // Terrain fill
  for(let x=0;x<WW;x++)for(let y=0;y<WH;y++){
    if(y>=WH-1){map[x][y]=T.BEDROCK;continue;}
    if(y>surf[x]+25)map[x][y]=T.STONE;
    else if(y>surf[x])map[x][y]=T.DIRT;
    else if(y===surf[x])map[x][y]=T.GRASS;
  }
  // Caves
  for(let i=0;i<42;i++){
    let cx=(Math.random()*WW)|0,cy=(surf[cx]+15+Math.random()*65)|0,ang=Math.random()*Math.PI*2;
    for(let j=0,len=40+Math.random()*100;j<len;j++){
      ang+=(Math.random()-.5)*.9;cx+=Math.cos(ang);cy+=Math.sin(ang)*.6;
      const r=2+Math.random()*3;
      for(let dx=-r-1;dx<=r+1;dx++)for(let dy=-r-1;dy<=r+1;dy++){
        if(dx*dx+dy*dy>r*r)continue;
        const nx=(cx+dx)|0,ny=(cy+dy)|0;
        if(nx>1&&nx<WW-2&&ny>5&&ny<WH-2&&map[nx][ny]!==T.BEDROCK)map[nx][ny]=T.AIR;
      }
    }
  }
  // Ores
  for(let i=0;i<380;i++){
    const x=(1+Math.random()*(WW-2))|0,y=(surf[x]+10+Math.random()*(WH-surf[x]-15))|0;
    const ore=Math.random()<.6?T.COAL:T.IRON;
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<WW&&ny>0&&ny<WH&&map[nx][ny]===T.STONE&&Math.random()<.7)map[nx][ny]=ore;
    }
  }
  // Trees
  for(let x=5;x<WW-5;x++){
    if(Math.random()<.08&&map[x][surf[x]]===T.GRASS&&Math.abs(surf[x]-surf[x-1])<=2&&Math.abs(surf[x]-surf[x+1])<=2){
      const h=5+((Math.random()*4)|0);
      for(let y=surf[x]-h;y<surf[x];y++)if(y>=0)map[x][y]=T.WOOD;
      const lr=3+(Math.random()*2|0),lt=surf[x]-h-1;
      for(let dx=-lr;dx<=lr;dx++)for(let dy=-lr;dy<=lr;dy++){
        if(dx*dx*.6+dy*dy>lr*lr+1)continue;
        const lx=x+dx,ly=lt+dy;
        if(lx>0&&lx<WW&&ly>0&&ly<WH&&map[lx][ly]===T.AIR)map[lx][ly]=T.LEAVES;
      }
    }
  }
  // Sand beaches
  for(let x=0;x<WW;x++)if(surf[x]>82)for(let y=surf[x];y<Math.min(WH-1,surf[x]+6);y++)if([T.DIRT,T.GRASS,T.STONE].includes(map[x][y]))map[x][y]=T.SAND;
  return{map,surf};
}

/* ── MOBILE JOYSTICK ── */
const joy={id:null,dx:0,dy:0};
const mBtns={jump:false,atk:false,mine:false};
function setupMobile(){
  if(!IS_MOBILE)return;
  document.getElementById('mobileHUD').classList.add('visible');
  const zone=document.getElementById('joyZone'),knob=document.getElementById('joyKnob'),MR=44;
  function mv(id,cx,cy){if(joy.id!==id)return;const r=zone.getBoundingClientRect(),ox=r.left+r.width/2,oy=r.top+r.height/2;let dx=cx-ox,dy=cy-oy;const d=Math.sqrt(dx*dx+dy*dy);if(d>MR){dx=dx/d*MR;dy=dy/d*MR;}joy.dx=dx/MR;joy.dy=dy/MR;knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}
  zone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joy.id=t.identifier;mv(t.identifier,t.clientX,t.clientY);},{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)mv(t.identifier,t.clientX,t.clientY);},{passive:false});
  zone.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===joy.id){joy.id=null;joy.dx=0;joy.dy=0;knob.style.transform='translate(-50%,-50%)';}});
  function btn(id,k){const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();mBtns[k]=true;el.classList.add('pressed');},{passive:false});el.addEventListener('touchend',()=>{mBtns[k]=false;el.classList.remove('pressed');});el.addEventListener('touchcancel',()=>{mBtns[k]=false;el.classList.remove('pressed');});}
  btn('btnJump','jump');btn('btnAtk','atk');btn('btnMine','mine');
  document.getElementById('btnCraft').addEventListener('touchstart',e=>{e.preventDefault();openCraft();},{passive:false});
}

/* ══════════════════════════════════════════════════════
   GAME SCENE
══════════════════════════════════════════════════════ */
class GameScene extends Phaser.Scene{
  constructor(){super('Game');}

  create(){
    window.GS=this;
    document.getElementById('saveBtnIG').style.display='block';
    const pd=window.PL;
    if(pd){this.map=b64Map(pd.map);this.surf=pd.surf;}
    else{const w=genWorld();this.map=w.map;this.surf=w.surf;}

    this.cameras.main.setBounds(0,0,WW*TS,WH*TS);
    this.bgSky=this.add.graphics().setScrollFactor(0).setDepth(-100);
    this.bgMtn=this.add.graphics().setScrollFactor(.22).setDepth(-80);
    this.bgBTr=this.add.graphics().setScrollFactor(.45).setDepth(-70);
    this.clouds=[];this.buildBg();
    this.CS=20;this.chunks={};
    this.mGfx=this.add.graphics().setDepth(14);
    this.xGfx=this.add.graphics().setDepth(15);
    this.wGfx=this.add.graphics().setDepth(12);
    this.lightGfx=this.add.graphics().setDepth(55); // torch light

    // Player stats
    this.pFacing=1;this.pVx=0;this.pVy=0;this.pOnGround=false;
    this.pHP=pd?pd.pHP:100;this.pMaxHP=100;this.pInv=0;
    this.pState='idle';this.atkCD=0;this.placeCD=0;this.atkFlash=0;
    this.regenTimer=0; // HP regen timer
    this.fallVy=0;     // track fall speed for fall damage
    this.spawnNight=false; // night spawn tracker
    this.nightSpawnTimer=0;

    const sx=pd?pd.px:(WW/2)*TS,sy=pd?pd.py:(this.surf[(WW/2)|0]-3)*TS;
    this.pC=this.add.container(sx,sy).setDepth(11);
    this.pG=this.add.graphics();this.pC.add(this.pG);

    // Inventory
    this.slots=Array(9).fill(null);this.sel=pd?pd.sel:0;
    if(pd&&pd.slots){pd.slots.forEach((s,i)=>{if(!s)return;const d=ITEMS[s.type];if(!d)return;this.slots[i]={...d,type:s.type,count:s.count};});}
    else{this.addItem('pickaxe',1);this.addItem('sword',1);this.addItem('dirt',20);this.addItem('stone',10);this.addItem('wood',10);this.addItem('torch',4);}

    this.mobs=[];this.drops=[];this.spawnMobs(false);
    this.dayT=0;this.dayDur=120000;
    this.nightOvl=this.add.graphics().setScrollFactor(0).setDepth(60);
    this.buildUI();

    this.keys=this.input.keyboard.addKeys({L:'LEFT',R:'RIGHT',U:'UP',A:'A',D:'D',W:'W',SP:'SPACE'});
    this.input.keyboard.on('keydown',e=>{
      if(e.key>='1'&&e.key<='9'){this.sel=+e.key-1;this.refreshHB();}
      if(e.key==='Escape')this.togglePause();
      if((e.key==='c'||e.key==='C')&&!e.ctrlKey)openCraft();
      if((e.key==='s'||e.key==='S')&&e.ctrlKey){e.preventDefault();openSaveMenu();}
    });

    this.isDown=false;this.rightDown=false;this.pwx=sx;this.pwy=sy;
    this.input.on('pointerdown',p=>{
      tryM();if(this.paused||document.getElementById('saveMenu').classList.contains('open')||document.getElementById('craftPanel').classList.contains('open'))return;
      this.pwx=p.worldX;this.pwy=p.worldY;
      if(p.rightButtonDown()){this.rightDown=true;this.doPlace(Math.floor(p.worldX/TS),Math.floor(p.worldY/TS));return;}
      this.isDown=true;this.startAct(p.worldX,p.worldY);
    });
    this.input.on('pointermove',p=>{
      this.pwx=p.worldX;this.pwy=p.worldY;
      if(!this.isDown||this.paused)return;
      const tx=Math.floor(p.worldX/TS),ty=Math.floor(p.worldY/TS);
      if(this.mT&&(this.mT.tx!==tx||this.mT.ty!==ty)){this.mT=null;this.mProg=0;}
      if(!this.mT)this.startAct(p.worldX,p.worldY);
    });
    this.input.on('pointerup',()=>{this.isDown=false;this.rightDown=false;this.mT=null;this.mProg=0;});
    if(this.input.mouse)this.input.mouse.disableContextMenu();
    this.input.on('wheel',(p,o,dx,dy)=>{this.sel=(this.sel+(dy>0?1:-1)+9)%9;this.refreshHB();});
    this.mT=null;this.mProg=0;
    this.cameras.main.startFollow(this.pC,true,.1,.1);
    this.refreshChunks();this.drawPlayer();this.refreshHB();
    this.paused=false;
    // Use item (bandage)
    this.input.keyboard.on('keydown-F',()=>this.useConsumable());
  }

  startAct(wx,wy){
    const item=this.selItem();
    if(item&&(item.type==='sword'||item.type==='ironsword')){this.doAttack(wx,wy);return;}
    const tx=Math.floor(wx/TS),ty=Math.floor(wy/TS);
    if(this.canMine(tx,ty)){this.mT={tx,ty};this.mProg=0;}
  }

  useConsumable(){
    const item=this.selItem();if(!item)return;
    if(item.heal){this.pHP=Math.min(this.pMaxHP,this.pHP+item.heal);this.removeItem(item.type,1);this.refreshHB();showToast(`+${item.heal} HP! ❤️`);}
  }

  /* ── BG ── */
  buildBg(){
    const sy=75*TS;
    const g=this.bgMtn;g.clear();g.fillStyle(0x1a3a1a,.6);g.beginPath();g.moveTo(0,sy);
    for(let x=0;x<=WW*TS;){const w=120+((x*7)%190),h=90+((x*3)%210);g.lineTo(x+w/2,sy-h);g.lineTo(x+w,sy);x+=w*.65;}
    g.closePath();g.fillPath();
    const t=this.bgBTr;t.clear();
    for(let x=0;x<WW*TS;x+=24+((x*7)%42)){const h=38+((x*3)%62),w=18+((x*5)%32);t.fillStyle(0x0a2a0a,.55);t.fillTriangle(x,sy,x+w/2,sy-h,x+w,sy);}
    for(let i=0;i<20;i++){const cg=this.add.graphics().setScrollFactor(.6+Math.random()*.15).setDepth(-60);const cx=Math.random()*WW*TS,cy=25+Math.random()*200,cw=55+Math.random()*85;this.drawCloud(cg,cx,cy,cw);this.clouds.push({gfx:cg,x:cx,y:cy,w:cw,spd:.07+Math.random()*.18});}
    this.drawSky(0);
  }
  drawSky(d){
    const g=this.bgSky,W=this.scale.width,H=this.scale.height;g.clear();
    let tR,tG,tB,bR,bG,bB;
    if(d<.1){const t=d/.1;tR=lerp(10,100,t);tG=lerp(10,160,t);tB=lerp(50,220,t);bR=lerp(20,180,t);bG=lerp(30,220,t);bB=lerp(80,255,t);}
    else if(d<.45){tR=100;tG=160;tB=220;bR=180;bG=220;bB=255;}
    else if(d<.55){const t=(d-.45)/.1;tR=lerp(100,30,t);tG=lerp(160,30,t);tB=lerp(220,80,t);bR=lerp(180,200,t);bG=lerp(220,100,t);bB=lerp(255,50,t);}
    else if(d<.65){const t=(d-.55)/.1;tR=lerp(30,5,t);tG=lerp(30,5,t);tB=lerp(80,30,t);bR=lerp(200,10,t);bG=lerp(100,20,t);bB=lerp(50,60,t);}
    else{tR=5;tG=5;tB=30;bR=10;bG=20;bB=60;}
    g.fillGradientStyle(rgb(tR,tG,tB),rgb(tR,tG,tB),rgb(bR,bG,bB),rgb(bR,bG,bB),1);g.fillRect(0,0,W,H);
    if(d>.55||d<.05){const a=d<.05?d/.05:d>.9?(1-d)/.1:1;for(let i=0;i<80;i++){g.fillStyle(0xffffff,(.3+(i%3)*.2)*a);g.fillRect((i*137+71)%W,(i*91+43)%(H*.72),i%5===0?2:1,i%5===0?2:1);}}
    const ang=d*Math.PI*2-Math.PI/2,cx=W/2+Math.cos(ang)*W*.42,cy=H*.4+Math.sin(ang)*H*.38;
    if(d<.5||d>.95){g.fillStyle(0xFFEE44,1);g.fillCircle(cx,cy,22);g.fillStyle(0xFFEE44,.22);g.fillCircle(cx,cy,36);}
    else{g.fillStyle(0xdde8ff,.9);g.fillCircle(cx,cy,16);g.fillStyle(rgb(tR,tG,tB),.95);g.fillCircle(cx+7,cy-4,13);}
  }
  drawCloud(g,x,y,w){g.clear();const h=w*.45;g.fillStyle(0xffffff,.72);g.fillEllipse(x,y,w,h);g.fillEllipse(x+w*.25,y-h*.35,w*.7,h*.7);g.fillEllipse(x-w*.2,y-h*.2,w*.55,h*.55);}

  /* ── TORCH LIGHT ── */
  updateTorchLight(){
    const g=this.lightGfx;g.clear();
    const cam=this.cameras.main;
    const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+2);
    const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+2);
    for(let x=tx0;x<=tx1;x++)for(let y=ty0;y<=ty1;y++){
      if(this.map[x][y]===T.TORCH){
        const px=x*TS+TS/2,py=y*TS+TS/2;
        const flicker=1+Math.sin(Date.now()*.008+x+y)*.08;
        g.fillStyle(0xffaa33,.18*flicker);g.fillCircle(px,py,55*flicker);
        g.fillStyle(0xffcc66,.25*flicker);g.fillCircle(px,py,30*flicker);
        g.fillStyle(0xffee99,.4*flicker);g.fillCircle(px,py,14*flicker);
      }
    }
    // Player light (small)
    g.fillStyle(0xffffff,.04);g.fillCircle(this.pC.x,this.pC.y,48);
  }

  /* ── CHUNKS ── */
  ck(cx,cy){return`${cx},${cy}`;}
  refreshChunks(){
    const cam=this.cameras.main;
    const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+1);
    const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+1);
    const cx0=Math.floor(tx0/this.CS),cx1=Math.floor(tx1/this.CS),cy0=Math.floor(ty0/this.CS),cy1=Math.floor(ty1/this.CS);
    const vis=new Set();
    for(let cx=cx0;cx<=cx1;cx++)for(let cy=cy0;cy<=cy1;cy++){const k=this.ck(cx,cy);vis.add(k);if(!this.chunks[k]){this.chunks[k]=this.add.graphics().setDepth(10);this.renderChunk(cx,cy);}}
    for(const k in this.chunks)if(!vis.has(k)){this.chunks[k].destroy();delete this.chunks[k];}
  }
  renderChunk(cx,cy){const g=this.chunks[this.ck(cx,cy)];if(!g)return;g.clear();for(let x=cx*this.CS;x<(cx+1)*this.CS&&x<WW;x++)for(let y=cy*this.CS;y<(cy+1)*this.CS&&y<WH;y++){const t=this.map[x][y];if(!t)continue;this.drawTile(g,x,y,t);}}
  drawTile(g,x,y,t){
    const c=TC[t];if(!c)return;
    const px=x*TS,py=y*TS;
    if(t===T.TORCH){
      // Draw torch specially
      g.fillStyle(0x8B4513);g.fillRect(px+7,py+4,2,10);
      g.fillStyle(0xff9900);g.fillCircle(px+8,py+4,4);
      g.fillStyle(0xffff00,.8);g.fillCircle(px+8,py+3,2);
      return;
    }
    g.fillStyle(c.b);g.fillRect(px,py,TS,TS);
    g.fillStyle(c.a);g.fillRect(px,py,TS-2,TS-2);
    if(t===T.GRASS){g.fillStyle(0x4aaa28);g.fillRect(px,py,TS,3);g.fillStyle(0x70cc40);for(let i=2;i<TS;i+=3)g.fillRect(px+i,py,1,2);}
    else if(t===T.COAL){g.fillStyle(0x222222);g.fillRect(px+3,py+3,4,4);g.fillRect(px+9,py+7,3,3);}
    else if(t===T.IRON){g.fillStyle(0xcc8844);g.fillRect(px+3,py+3,3,3);g.fillRect(px+9,py+8,3,3);}
    else if(t===T.WATER){g.fillStyle(0x1a50cc,.8);g.fillRect(px,py,TS,TS);g.fillStyle(0x60a0ff,.4);g.fillRect(px+2,py+3,TS-4,2);g.fillRect(px+4,py+9,TS-8,2);}
    else if(t===T.WOOD){g.fillStyle(0x602010);g.fillRect(px+6,py,4,TS);}
    else if(t===T.PLANK){g.fillStyle(0x704020,.6);g.fillRect(px,py+5,TS,2);g.fillRect(px,py+11,TS,2);g.fillRect(px+8,py,2,TS);}
    else if(t===T.BRICK){g.fillStyle(0x442211,.5);for(let row=0;row<2;row++)for(let col=0;col<2;col++)g.fillRect(px+col*8+row*4,py+row*8,7,7);}
    else if(t===T.GLASS){g.fillStyle(0xffffff,.35);g.fillRect(px+2,py+2,TS-4,TS-4);g.fillStyle(0xaaddff,.2);g.fillRect(px+3,py+3,4,4);}
    else if(t===T.LEAVES){g.fillStyle(0x285818,.6);g.fillRect(px+2,py+2,4,4);g.fillRect(px+9,py+6,4,4);}
    g.fillStyle(0x000000,.18);g.fillRect(px+TS-2,py,2,TS);g.fillRect(px,py+TS-2,TS,2);
  }
  invChunk(tx,ty){const k=this.ck(Math.floor(tx/this.CS),Math.floor(ty/this.CS));if(this.chunks[k])this.renderChunk(Math.floor(tx/this.CS),Math.floor(ty/this.CS));}

  /* ── PLAYER DRAW ── */
  drawPlayer(){
    const g=this.pG;g.clear();
    const f=this.pFacing,t=Date.now(),run=this.pState==='run',ls=run?Math.sin(t*.013):0;
    // Shadow
    g.fillStyle(0x000000,.18);g.fillEllipse(0,17,18,5);
    // Boots
    g.fillStyle(0x5a3010);g.fillRect(f>0?0:-6,13,5,4+ls*3);g.fillRect(f>0?-6:0,13,5,4-ls*3);
    // Legs
    g.fillStyle(0x1a3a7a);g.fillRect(f>0?0:-6,7,5,7+ls*2);g.fillRect(f>0?-6:0,7,5,7-ls*2);
    // Body
    g.fillStyle(0x2a6a2a);g.fillRect(-6,-4,12,12);g.fillStyle(0x1a4a1a);g.fillRect(-6,3,12,2);
    // Arms (mining animation)
    const ms=this.mT?Math.sin(t*.025)*16:0;
    g.fillStyle(0x2a6a2a);g.fillRect(f>0?-9:5,-3,4,10);g.fillRect(f>0?5:-9,-3+ms*.12,4,10);
    // Head
    g.fillStyle(0xffcc88);g.fillRect(-5,-16,10,11);
    // Hair
    g.fillStyle(0x3a1800);g.fillRect(-5,-16,10,4);
    if(f>0)g.fillRect(-5,-16,2,8);else g.fillRect(3,-16,2,8);
    // Eye
    g.fillStyle(0x1a1a1a);g.fillRect(f>0?1:-4,-11,2,3);
    g.fillStyle(0xffffff);g.fillRect(f>0?2:-3,-11,1,1);
    // Invincibility flash
    if(this.pInv>0&&Math.floor(this.pInv/60)%2===0){g.fillStyle(0xff4444,.3);g.fillRect(-7,-17,14,34);}
    this.pG.scaleX=f;
  }

  /* ── COLLISION ── */
  solid(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return true;const t=this.map[tx][ty];return t!==T.AIR&&t!==T.WATER&&t!==T.LEAVES&&t!==T.TORCH;}
  collides(x,y,w=10,h=28){return[[x-w/2+1,y-h+1],[x+w/2-2,y-h+1],[x-w/2+1,y-1],[x+w/2-2,y-1]].some(([px,py])=>this.solid(Math.floor(px/TS),Math.floor(py/TS)));}

  /* ── MOBS ── */
  spawnMobs(night=false){
    const count=night?8:20;
    for(let i=0;i<count;i++){
      const x=(10+Math.random()*(WW-20))|0;
      const types=night?['zombie','eye','goblin','slime']:['goblin','slime'];
      const type=types[Math.floor(Math.random()*types.length)];
      this.mobs.push(new Mob(this,x*TS,(this.surf[x]-1)*TS,type));
    }
  }

  /* ── INVENTORY ── */
  addItem(type,count){for(let i=0;i<9;i++)if(this.slots[i]?.type===type){this.slots[i].count+=count;return;}for(let i=0;i<9;i++)if(!this.slots[i]){const d=ITEMS[type];if(!d)return;this.slots[i]={...d,type,count};return;}}
  removeItem(type,count){for(let i=0;i<9;i++)if(this.slots[i]?.type===type){this.slots[i].count-=count;if(this.slots[i].count<=0)this.slots[i]=null;return;}}
  selItem(){return this.slots[this.sel]||null;}
  canMine(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return false;const t=this.map[tx][ty];if(!t||t===T.WATER||t===T.BEDROCK)return false;return Math.hypot(tx*TS+TS/2-this.pC.x,ty*TS+TS/2-this.pC.y)<165;}
  doPlace(tx,ty){
    if(this.placeCD>0||tx<0||tx>=WW||ty<0||ty>=WH||this.map[tx][ty])return;
    const px=Math.floor(this.pC.x/TS),py=Math.floor(this.pC.y/TS);if(tx===px&&Math.abs(ty-py)<=1)return;
    const item=this.selItem();if(!item?.isBlock)return;
    this.map[tx][ty]=item.tile;this.removeItem(item.type,1);this.invChunk(tx,ty);this.refreshHB();this.placeCD=200;
    const fl=this.add.graphics().setDepth(20);fl.fillStyle(0xffffff,.4);fl.fillRect(tx*TS,ty*TS,TS,TS);
    this.tweens.add({targets:fl,alpha:0,duration:110,onComplete:()=>fl.destroy()});
  }
  doAttack(wx,wy){
    if(this.atkCD>0)return;this.atkCD=350;
    if(wx!==undefined)this.pFacing=wx>this.pC.x?1:-1;
    const item=this.selItem();const dmg=item?.dmg||20;
    this.mobs.forEach(m=>{if(!m.alive)return;const dx=m.cont.x-this.pC.x,dy=m.cont.y-this.pC.y,dist=Math.sqrt(dx*dx+dy*dy);if((Math.sign(dx)===this.pFacing&&dist<85)||(dist<48)){m.takeDamage(dmg,this.pFacing*5,-4);this.hitFX(m.cont.x,m.cont.y);}});
    this.atkFlash=8;
  }

  /* ── MINING ── */
  updateMining(dt){
    this.mGfx.clear();this.xGfx.clear();if(!this.mT)return;
    const{tx,ty}=this.mT;if(!this.canMine(tx,ty)){this.mT=null;this.mProg=0;return;}
    this.xGfx.lineStyle(2,0xffffff,.8);this.xGfx.strokeRect(tx*TS-1,ty*TS-1,TS+2,TS+2);this.xGfx.fillStyle(0xffffff,.06);this.xGfx.fillRect(tx*TS,ty*TS,TS,TS);
    const item=this.selItem();const spd=item?.spd||(item?.type==='ironpick'?8:item?.type==='pickaxe'?5.5:1.8);
    this.mProg+=spd*dt/1000;
    const maxHP=THP[this.map[tx][ty]]||1,pct=Math.min(this.mProg/maxHP,1);
    const px=tx*TS,py=ty*TS;this.mGfx.fillStyle(0x000000,.35*pct);this.mGfx.fillRect(px,py,TS,TS);
    const L=()=>this.mGfx.lineStyle(1,0x000000,.6);
    if(pct>.15){L();this.mGfx.beginPath();this.mGfx.moveTo(px+2,py+4);this.mGfx.lineTo(px+9,py+7);this.mGfx.strokePath();}
    if(pct>.35){L();this.mGfx.beginPath();this.mGfx.moveTo(px+8,py+2);this.mGfx.lineTo(px+4,py+11);this.mGfx.strokePath();}
    if(pct>.6){L();this.mGfx.beginPath();this.mGfx.moveTo(px+1,py+8);this.mGfx.lineTo(px+12,py+10);this.mGfx.strokePath();}
    if(pct>.8){L();this.mGfx.beginPath();this.mGfx.moveTo(px+5,py+1);this.mGfx.lineTo(px+3,py+13);this.mGfx.strokePath();}
    if(this.mProg>=maxHP)this.breakTile(tx,ty);
  }
  breakTile(tx,ty){
    const t=this.map[tx][ty];this.map[tx][ty]=T.AIR;this.mT=null;this.mProg=0;
    const dr=TDROP[t];if(dr)this.spawnDrop(tx*TS+TS/2,ty*TS+TS/2,dr);
    this.breakFX(tx*TS+TS/2,ty*TS+TS/2,TC[t]||{a:0x888888,b:0x444444});this.invChunk(tx,ty);
  }

  /* ── DROPS ── */
  spawnDrop(x,y,type){this.drops.push({x,y,type,vx:(Math.random()-.5)*3,vy:-3-Math.random()*2,onG:false,bob:Math.random()*Math.PI*2,age:0,gfx:this.add.graphics().setDepth(18)});}
  drawDrop(d){const g=d.gfx,def=ITEMS[d.type],c=def?.color||0x888888;g.clear();g.setPosition(d.x,d.y);g.fillStyle(0x000000,.35);g.fillRect(-5,-4,10,9);g.fillStyle(c);g.fillRect(-4,-5,8,8);g.fillStyle(0xffffff,.3);g.fillRect(-4,-5,3,2);}
  updateDrops(dt){
    for(let i=this.drops.length-1;i>=0;i--){const d=this.drops[i];d.age+=dt;if(d.age>30000){d.gfx.destroy();this.drops.splice(i,1);continue;}if(!d.onG){d.vy+=.3;d.x+=d.vx;d.y+=d.vy;d.vx*=.96;const bx=Math.floor(d.x/TS),by=Math.floor(d.y/TS);if(bx>=0&&bx<WW&&by>=0&&by<WH&&this.solid(bx,by)){d.y=by*TS-4;d.vy=-.5;d.onG=true;}}else d.y+=Math.sin(d.age*.004+d.bob)*.25;const dx=d.x-this.pC.x,dy=d.y-this.pC.y;if(dx*dx+dy*dy<32*32){this.addItem(d.type,1);this.refreshHB();this.tweens.add({targets:d.gfx,alpha:0,y:d.gfx.y-18,duration:160,onComplete:()=>d.gfx.destroy()});this.drops.splice(i,1);continue;}this.drawDrop(d);}
  }

  /* ── FX ── */
  breakFX(x,y,colors){for(let i=0;i<10;i++){let px=x,py=y,vx=(Math.random()-.5)*7,vy=-3-Math.random()*4,life=1,sz=2+Math.random()*3;const col=Math.random()<.5?colors.a:colors.b,g=this.add.graphics().setDepth(22);const tick=()=>{vy+=.35;px+=vx;py+=vy;life-=.055;g.clear();g.fillStyle(col,life);g.fillRect(px-sz/2,py-sz/2,sz,sz);if(life<=0)g.destroy();else this.time.delayedCall(16,tick);};this.time.delayedCall(i*10,tick);}}
  hitFX(x,y){for(let i=0;i<7;i++){let px=x,py=y,ang=Math.random()*Math.PI*2,sp=3+Math.random()*4,life=1;const g=this.add.graphics().setDepth(25);const tick=()=>{px+=Math.cos(ang)*sp;py+=Math.sin(ang)*sp;sp*=.85;life-=.1;g.clear();g.fillStyle(0xff4422,life);g.fillCircle(px,py,3);if(life<=0)g.destroy();else this.time.delayedCall(16,tick);};this.time.delayedCall(i*7,tick);}}

  /* ── WEAPON VISUAL ── */
  updateWeapon(){
    const g=this.wGfx;g.clear();const item=this.selItem();if(!item)return;
    const ang=Math.atan2(this.pwy-this.pC.y,this.pwx-this.pC.x);
    const ax=this.pC.x+Math.cos(ang)*8,ay=this.pC.y+Math.sin(ang)*8;
    if(item.type==='pickaxe'||item.type==='ironpick'){
      const col=item.type==='ironpick'?0xddaa55:0xcccccc;
      const pa=this.mT?ang+Math.sin(Date.now()*.025)*.5:ang;
      g.lineStyle(3,col);g.beginPath();g.moveTo(ax,ay);g.lineTo(ax+Math.cos(pa)*22,ay+Math.sin(pa)*22);g.strokePath();
      g.fillStyle(col);g.fillRect(ax+Math.cos(pa)*17-3,ay+Math.sin(pa)*17-3,8,5);
    }else if(item.type==='sword'||item.type==='ironsword'){
      const col=item.type==='ironsword'?0xddaa55:0x5599ff;
      const len=item.type==='ironsword'?40:32;
      const sw=(this.atkCD>0)?(1-this.atkCD/350)*.8:0,sa=ang-sw*this.pFacing;
      g.lineStyle(item.type==='ironsword'?5:4,col);g.beginPath();g.moveTo(ax,ay);g.lineTo(ax+Math.cos(sa)*len,ay+Math.sin(sa)*len);g.strokePath();
      g.lineStyle(5,0xdddddd);g.beginPath();g.moveTo(ax+Math.cos(sa+Math.PI/2)*7,ay+Math.sin(sa+Math.PI/2)*7);g.lineTo(ax+Math.cos(sa-Math.PI/2)*7,ay+Math.sin(sa-Math.PI/2)*7);g.strokePath();
      if(this.atkFlash>0){g.lineStyle(2,0xffffff,.5*this.atkFlash/8);g.beginPath();g.arc(this.pC.x,this.pC.y,58,sa-.5,sa+.5);g.strokePath();this.atkFlash--;}
    }else if(item.isBlock){
      const bx=Math.floor(this.pwx/TS)*TS,by=Math.floor(this.pwy/TS)*TS,col=TC[item.tile]?.a||0xffffff;
      g.fillStyle(col,.28);g.fillRect(bx,by,TS,TS);g.lineStyle(1,col,.85);g.strokeRect(bx,by,TS,TS);
    }
  }

  /* ── UI ── */
  buildUI(){
    const W=this.scale.width,H=this.scale.height;
    this.hbGfx=this.add.graphics().setScrollFactor(0).setDepth(100);
    this.hpGfx=this.add.graphics().setScrollFactor(0).setDepth(100);
    this.hbNums=[];this.hbCounts=[];
    for(let i=0;i<9;i++){
      this.hbNums.push(this.add.text(0,0,'',{fontFamily:'"Courier New",monospace',fontSize:'10px',color:'#ccc'}).setScrollFactor(0).setDepth(102));
      this.hbCounts.push(this.add.text(0,0,'',{fontFamily:'"Courier New",monospace',fontSize:'10px',color:'#aaa'}).setScrollFactor(0).setDepth(102));
      const idx=i;
      const zone=this.add.zone(4+i*46+20,H-34,40,40).setScrollFactor(0).setDepth(103).setInteractive({cursor:'pointer'});
      zone.on('pointerdown',()=>{this.sel=idx;this.refreshHB();});
    }
    this.sitText=this.add.text(W/2,H-60,'',{fontFamily:'"Courier New",monospace',fontSize:'13px',color:'#eee',stroke:'#000',strokeThickness:3}).setOrigin(.5).setScrollFactor(0).setDepth(101);
    this.pausePanel=this.add.graphics().setScrollFactor(0).setDepth(120).setVisible(false);
    this.pauseTxt=this.add.text(W/2,H/2,'PAUSED',{fontFamily:'"Courier New",monospace',fontSize:'40px',color:'#FFD700',stroke:'#000',strokeThickness:5}).setOrigin(.5).setScrollFactor(0).setDepth(121).setVisible(false);
    this.pauseHint=this.add.text(W/2,H/2+52,'Press ESC to resume',{fontFamily:'"Courier New",monospace',fontSize:'16px',color:'#aaa',stroke:'#000',strokeThickness:2}).setOrigin(.5).setScrollFactor(0).setDepth(121).setVisible(false);
    if(!IS_MOBILE)this.add.text(W/2,H-18,'LMB:Mine/Attack · RMB:Place · Click slot / 1–9:Select · C:Craft · F:Use item · Ctrl+S:Save · Esc:Pause',{fontFamily:'"Courier New",monospace',fontSize:'9px',color:'#667788'}).setOrigin(.5).setScrollFactor(0).setDepth(101);
    this.refreshHB();
  }

  refreshHB(){
    const g=this.hbGfx;g.clear();const H=this.scale.height;
    // Hotbar slots
    for(let i=0;i<9;i++){
      const x=4+i*46,y=H-54,w=40,h=40,sel=i===this.sel;
      g.fillStyle(sel?0x2a5a2a:0x101810,.92);g.fillRoundedRect(x,y,w,h,5);
      g.lineStyle(sel?2:1,sel?0x6eff6e:0x3a5a3a);g.strokeRoundedRect(x,y,w,h,5);
      if(sel){g.lineStyle(1,0x5aff5a,.4);g.strokeRoundedRect(x+2,y+2,w-4,h-4,3);}
      g.fillStyle(0xffffff,.04);g.fillRoundedRect(x+1,y+1,w-2,4,3);
      const s=this.slots[i];if(s){g.fillStyle(s.color||0xaaaaaa);g.fillRect(x+12,y+8,16,16);g.fillStyle(0xffffff,.35);g.fillRect(x+12,y+8,7,5);}
      this.hbNums[i].setText(String(i+1)).setPosition(x+3,y+2);
      this.hbCounts[i].setText(s?.count>1?String(s.count):'').setPosition(x+24,y+28);
    }
    // HP Hearts (like Terraria!)
    const hg=this.hpGfx;hg.clear();
    const maxHearts=Math.ceil(this.pMaxHP/20);
    const fullHearts=Math.floor(this.pHP/20);
    const partial=(this.pHP%20)/20;
    for(let i=0;i<maxHearts;i++){
      const hx=8+i*22,hy=8;
      if(i<fullHearts){
        hg.fillStyle(0xff2244,.9);this.drawHeart(hg,hx,hy,9,1);
      }else if(i===fullHearts&&partial>0){
        hg.fillStyle(0x882233,.5);this.drawHeart(hg,hx,hy,9,1);
        hg.fillStyle(0xff2244,.9);this.drawHeart(hg,hx,hy,9,partial);
      }else{
        hg.fillStyle(0x441122,.6);this.drawHeart(hg,hx,hy,9,1);
      }
    }
    this.sitText.setText(this.selItem()?.name||'');
  }

  drawHeart(g,x,y,size,fill){
    // Simple pixel heart
    const s=Math.max(1,Math.round(size*fill));
    g.fillRect(x-s,y-s+2,s,s);g.fillRect(x+1,y-s+2,s,s);
    g.fillRect(x-s-1,y-s+3,s*3+2,s);
    g.fillRect(x-s,y-s+4,s*3,s);
    g.fillRect(x-s+1,y-s+5,s*3-2,s);
    if(s>2){g.fillRect(x-s+2,y-s+6,s*3-4,s);g.fillRect(x,y-s+7,s,s);}
  }

  togglePause(){
    this.paused=!this.paused;this.pausePanel.setVisible(this.paused);this.pauseTxt.setVisible(this.paused);this.pauseHint.setVisible(this.paused);
    if(this.paused){const W=this.scale.width,H=this.scale.height;this.pausePanel.clear();this.pausePanel.fillStyle(0x000000,.65);this.pausePanel.fillRect(0,0,W,H);this.pausePanel.fillStyle(0x1a2a1a,.92);this.pausePanel.fillRoundedRect(W/2-130,H/2-70,260,140,14);this.pausePanel.lineStyle(2,0x4a8a4a);this.pausePanel.strokeRoundedRect(W/2-130,H/2-70,260,140,14);}
  }

  /* ── MAIN UPDATE ── */
  update(time,dt){
    if(this.paused||document.getElementById('saveMenu').classList.contains('open')||document.getElementById('craftPanel').classList.contains('open'))return;
    if(this.atkCD>0)this.atkCD=Math.max(0,this.atkCD-dt);
    if(this.placeCD>0)this.placeCD=Math.max(0,this.placeCD-dt);
    if(this.pInv>0)this.pInv=Math.max(0,this.pInv-dt);

    // Day/night
    this.dayT=(this.dayT+dt)%this.dayDur;const dp=this.dayT/this.dayDur;this.drawSky(dp);
    const ov=this.nightOvl;ov.clear();let na=0;
    if(dp>.45&&dp<.55)na=((dp-.45)/.1)*.7;else if(dp>=.55&&dp<.9)na=.7;else if(dp>=.9)na=((1-dp)/.1)*.7;
    if(na>0){ov.fillStyle(0x000020,na);ov.fillRect(0,0,this.scale.width,this.scale.height);}
    this.clouds.forEach(c=>{c.x+=c.spd;if(c.x>WW*TS+200)c.x=-200;this.drawCloud(c.gfx,c.x,c.y,c.w);});

    // Night enemy spawning
    const isNight=dp>0.5&&dp<0.95;
    if(isNight&&!this.spawnNight){this.spawnNight=true;this.spawnMobs(true);}
    if(!isNight&&this.spawnNight)this.spawnNight=false;

    // HP Regen (slow, like Terraria)
    this.regenTimer+=dt;
    if(this.regenTimer>3000&&this.pHP<this.pMaxHP&&this.pInv<=0){this.pHP=Math.min(this.pMaxHP,this.pHP+1);this.regenTimer=0;}

    // Torch lighting
    this.updateTorchLight();

    // Movement
    const K=this.keys;
    const ml=(K.L.isDown||K.A.isDown)||(joy.dx<-.3);
    const mr=(K.R.isDown||K.D.isDown)||(joy.dx>.3);
    if(ml){this.pVx=-3.2;this.pFacing=-1;this.pState='run';}
    else if(mr){this.pVx=3.2;this.pFacing=1;this.pState='run';}
    else{this.pVx*=.72;if(Math.abs(this.pVx)<.1)this.pState='idle';}

    if(((K.SP.isDown||K.W.isDown)||mBtns.jump)&&this.pOnGround){this.pVy=-7.5;this.pOnGround=false;this.pState='jump';}
    // Track fall speed
    if(!this.pOnGround)this.fallVy=Math.max(this.fallVy,this.pVy);
    this.pVy=Math.min(this.pVy+.45,16);

    // Horizontal collision
    const nx=this.pC.x+this.pVx;
    if(!this.collides(nx,this.pC.y))this.pC.x=Phaser.Math.Clamp(nx,8,WW*TS-8);else this.pVx=0;
    // Vertical collision
    const ny=this.pC.y+this.pVy;this.pOnGround=false;
    if(!this.collides(this.pC.x,ny))this.pC.y=ny;
    else{
      // Fall damage! (like Terraria — damage if falling fast)
      if(this.pVy>10){
        const fd=Math.round((this.pVy-10)*8);
        if(fd>0){this.pHP=Math.max(1,this.pHP-fd);this.pInv=300;showToast(`Fall damage: -${fd} ❤️`);}
      }
      if(this.pVy>0){this.pOnGround=true;this.fallVy=0;}
      this.pVy=0;while(this.collides(this.pC.x,this.pC.y-1))this.pC.y-=1;
    }

    // Mobile actions
    if(mBtns.atk&&this.atkCD<=0)this.doAttack();
    if(mBtns.mine&&!this.mT){const fx=this.pC.x+this.pFacing*TS*1.5,fy=this.pC.y;const tx=Math.floor(fx/TS),ty=Math.floor(fy/TS);for(const[bx,by]of[[tx,ty],[tx,ty+1],[tx,ty-1],[tx+this.pFacing,ty]]){if(this.canMine(bx,by)){this.mT={tx:bx,ty:by};this.mProg=0;break;}}}
    if(!mBtns.mine&&!this.isDown&&this.mT){this.mT=null;this.mProg=0;}
    if(this.isDown&&!this.mT&&this.selItem()?.type!=='sword'&&this.selItem()?.type!=='ironsword'){const tx=Math.floor(this.pwx/TS),ty=Math.floor(this.pwy/TS);if(this.canMine(tx,ty)){this.mT={tx,ty};this.mProg=0;}}
    if(this.rightDown)this.doPlace(Math.floor(this.pwx/TS),Math.floor(this.pwy/TS));

    this.drawPlayer();this.updateMining(dt);this.updateDrops(dt);this.updateWeapon();
    this.refreshChunks();this.refreshHB();

    // Mobs
    this.mobs.forEach(m=>m.update(dt,this.pC.x,this.pC.y));
    this.mobs.forEach(m=>{
      if(!m.alive||m.dmgCD>0||this.pInv>0)return;
      const dx=m.cont.x-this.pC.x,dy=m.cont.y-this.pC.y;
      if(dx*dx+dy*dy<22*22){this.pHP=Math.max(0,this.pHP-m.dmg);m.dmgCD=900;this.pInv=600;this.regenTimer=0;if(this.pHP<=0)this.die();}
    });
    for(let i=this.mobs.length-1;i>=0;i--)if(!this.mobs[i].alive&&this.mobs[i].dead){this.mobs[i].cont.destroy();this.mobs.splice(i,1);}
  }

  die(){
    showToast('You died! 💀');
    this.cameras.main.fadeOut(1000,180,0,0);
    this.time.delayedCall(1400,()=>this.scene.start('Menu'));
  }
}

/* ══════════════════════════════════════════════════════
   MOB CLASS — multiple types
══════════════════════════════════════════════════════ */
class Mob{
  constructor(scene,x,y,type){
    this.sc=scene;this.type=type;this.alive=true;this.dead=false;
    this.cont=scene.add.container(x,y).setDepth(11);
    this.gfx=scene.add.graphics();this.cont.add(this.gfx);
    this.hpGfx=scene.add.graphics();this.cont.add(this.hpGfx);
    this.vx=0;this.vy=0;this.onG=false;this.facing=1;this.stateT=0;this.state='patrol';this.dmgCD=0;this.invCD=0;
    switch(type){
      case'goblin': this.hp=this.maxHp=35;this.color=0x228822;this.w=8;this.h=20;this.dmg=8;break;
      case'slime':  this.hp=this.maxHp=20;this.color=0x3355cc;this.w=10;this.h=10;this.dmg=5;break;
      case'zombie': this.hp=this.maxHp=60;this.color=0x446622;this.w=8;this.h=22;this.dmg=12;break;
      case'eye':    this.hp=this.maxHp=45;this.color=0xcc2222;this.w=12;this.h=12;this.dmg=10;this.flying=true;break;
      default:      this.hp=this.maxHp=20;this.color=0x888888;this.w=8;this.h=16;this.dmg=6;
    }
    this.draw();
  }
  solid(tx,ty){if(tx<0||tx>=WW||ty<0||ty>=WH)return true;const t=this.sc.map[tx][ty];return t!==T.AIR&&t!==T.WATER&&t!==T.LEAVES&&t!==T.TORCH;}
  draw(){
    const g=this.gfx;g.clear();if(!this.alive)return;
    if(this.type==='goblin'){
      const ls=this.state==='chase'?Math.sin(Date.now()*.018)*14:0;
      g.fillStyle(0x000000,.15);g.fillEllipse(0,11,12,4);
      g.fillStyle(0x114411);g.fillRect(-5,8,4,6+ls*.3);g.fillRect(1,8,4,6-ls*.3);
      g.fillStyle(this.color);g.fillRect(-4,-8,8,14);g.fillStyle(0x33aa33);g.fillRect(-4,-8,8,3);
      g.fillStyle(0x003300);g.fillRect(-5,-8,4,8);g.fillRect(1,-8,4,8);
      g.fillStyle(0xddff88);g.fillRect(-3,-12,6,6);g.fillStyle(0x113311);g.fillRect(-3,-12,6,2);
      g.fillStyle(0xffdd00);g.fillRect(0,1,5,2);g.scaleX=this.facing;
    }else if(this.type==='slime'){
      const bob=Math.sin(Date.now()*.006)*(this.state==='chase'?3:1.5);
      g.fillStyle(0x001a44,.2);g.fillEllipse(0,8,14,4);
      g.fillStyle(0x2244aa);g.fillEllipse(0,bob,14,10);g.fillStyle(0x3366ff,.8);g.fillEllipse(0,bob-2,11,7);
      g.fillStyle(0x66aaff,.4);g.fillEllipse(-1,bob-3,5,3);
      g.fillStyle(0xffff88);g.fillCircle(-2,bob-1,2);g.fillCircle(2,bob-1,2);
      g.fillStyle(0x000000);g.fillCircle(-2,bob-1,1);g.fillCircle(2,bob-1,1);
    }else if(this.type==='zombie'){
      const ls=this.state==='chase'?Math.sin(Date.now()*.012)*10:0;
      g.fillStyle(0x000000,.2);g.fillEllipse(0,12,14,4);
      g.fillStyle(0x223310);g.fillRect(-4,8,4,8+ls*.3);g.fillRect(1,8,4,8-ls*.3);
      g.fillStyle(0x334422);g.fillRect(-5,-4,10,13);
      g.fillStyle(0x446633);g.fillRect(-6,-5,4,10+ls*.2);g.fillRect(2,-5,4,10-ls*.2);
      g.fillStyle(0x88aa66);g.fillRect(-4,-16,8,13);
      g.fillStyle(0x223311);g.fillRect(-4,-16,8,4);
      g.fillStyle(0xcc2200,.8);g.fillCircle(-1,-11,2);g.fillCircle(2,-11,2);
      g.scaleX=this.facing;
    }else if(this.type==='eye'){
      const t=Date.now(),fl=Math.sin(t*.004)*4;
      g.fillStyle(0x000000,.2);g.fillEllipse(0,10,16,4);
      g.fillStyle(0xaa1111);g.fillEllipse(0,fl,16,14);
      g.fillStyle(0xdd2222);g.fillEllipse(0,fl-1,12,10);
      g.fillStyle(0xffffff);g.fillEllipse(0,fl-1,8,7);
      g.fillStyle(0x000000);g.fillEllipse(0,fl,5,5);
      g.fillStyle(0xff4444,.6);g.fillEllipse(0,fl+2,3,3);
    }
    const hg=this.hpGfx;hg.clear();
    if(this.hp<this.maxHp){const fy=-this.h-8;hg.fillStyle(0x660000);hg.fillRect(-12,fy,24,4);hg.fillStyle(0x44ff44);hg.fillRect(-12,fy,24*(this.hp/this.maxHp),4);}
  }
  update(dt,px,py){
    if(!this.alive)return;
    if(this.dmgCD>0)this.dmgCD-=dt;if(this.invCD>0)this.invCD-=dt;this.stateT+=dt;
    const dx=px-this.cont.x,dy=py-this.cont.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<110)this.state='chase';else if(dist>220)this.state='patrol';
    const spd=this.state==='chase'?({goblin:2,slime:.9,zombie:1.2,eye:1.5}[this.type]||1.5):.6;
    if(this.type==='eye'){
      // Flying demon eye — moves directly toward player
      if(this.state==='chase'){
        const ang=Math.atan2(dy,dx);
        this.cont.x+=Math.cos(ang)*spd;this.cont.y+=Math.sin(ang)*spd;
      }else{this.cont.x+=this.facing*spd*.4;if(this.stateT>1500){this.facing*=-1;this.stateT=0;}}
      this.draw();return;
    }
    if(this.state==='chase'){this.facing=dx>0?1:-1;this.vx=this.facing*spd;}
    else{if(this.stateT>1800){this.facing*=-1;this.stateT=0;}this.vx=this.facing*spd*.5;}
    this.vy=Math.min(this.vy+.35,16);
    const nnx=this.cont.x+this.vx,bx=Math.floor(nnx/TS),by=Math.floor((this.cont.y-this.h*.5)/TS),by2=Math.floor(this.cont.y/TS);
    if(!this.solid(bx,by)&&!this.solid(bx,by2))this.cont.x=Phaser.Math.Clamp(nnx,0,WW*TS);
    else{this.vx=0;this.facing*=-1;}
    if(this.onG&&this.solid(Math.floor((this.cont.x+this.facing*TS*1.2)/TS),Math.floor(this.cont.y/TS)))this.vy=-6.5;
    const nny=this.cont.y+this.vy;this.onG=false;
    if(!this.solid(Math.floor(this.cont.x/TS),Math.floor(nny/TS)))this.cont.y=nny;
    else{if(this.vy>0)this.onG=true;this.vy=0;}
    this.draw();
  }
  takeDamage(dmg,vx,vy){
    if(!this.alive||this.invCD>0)return;
    this.hp-=dmg;this.invCD=200;
    if(this.hp<=0){
      this.alive=false;
      this.sc.time.delayedCall(350,()=>{this.gfx.clear();this.dead=true;});
      this.sc.time.delayedCall(30,()=>this.sc.breakFX(this.cont.x,this.cont.y,{a:this.color,b:0xcc2222}));
      // Drop loot based on type
      const loot={goblin:['dirt','coal','iron'],slime:['dirt','stone'],zombie:['dirt','plank','iron'],eye:['iron','coal']}[this.type]||['dirt'];
      const drop=loot[Math.floor(Math.random()*loot.length)];
      this.sc.spawnDrop(this.cont.x,this.cont.y,drop);
      if(Math.random()<.15)this.sc.spawnDrop(this.cont.x,this.cont.y,'bandage');
    }else{this.vx=vx||0;this.vy=vy||-3;}
  }
}

/* ── LAUNCH ── */
window.PG=new Phaser.Game({
  type:Phaser.AUTO,
  width:IS_MOBILE?window.innerWidth:800,
  height:IS_MOBILE?window.innerHeight:560,
  backgroundColor:'#000008',
  parent:document.body,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:'arcade'},
  scene:[MenuScene,GameScene]
});
</script>
