<!DOCTYPE html>

<html lang="en">
<head>

<script>
// ── ONLINE MULTIPLAYER via PeerJS ──
let peer=null,conn=null,myId=null,isHost=false;
let onlinePlayers={};
function initPeer(){peer=new Peer(undefined,{debug:0});peer.on('open',id=>{myId=id;document.getElementById('myIdTxt').textContent='Your ID: '+id;});peer.on('connection',c=>{conn=c;isHost=true;setupConn(c);showToast('👥 Player joined!',3000);});peer.on('error',e=>showToast('❌ Online error: '+e.type,3000));}
function connectTo(){const id=document.getElementById('peerIdInput').value.trim();if(!id)return;conn=peer.connect(id);setupConn(conn);showToast('🔗 Connecting...',2000);}
function setupConn(c){c.on('open',()=>{showToast('✅ Connected!',3000);closeOnlinePanel();});c.on('data',data=>{if(!window.GS)return;if(data.type==='pos'){const id=data.id;if(!onlinePlayers[id]){const sc=window.GS;const g=sc.add.graphics().setDepth(11);const nt=sc.add.text(0,0,'👤',{fontSize:'10px'}).setDepth(12);onlinePlayers[id]={gfx:g,nametag:nt};}const op=onlinePlayers[id];op.x=data.x;op.y=data.y;op.hp=data.hp;op.facing=data.facing;drawOnlinePlayer(op);}if(data.type==='block'&&window.GS){window.GS.map[data.tx][data.ty]=data.bt;window.GS.invChunk(data.tx,data.ty);}});c.on('close',()=>{showToast('❌ Disconnected',3000);Object.values(onlinePlayers).forEach(op=>{op.gfx.destroy();op.nametag.destroy();});onlinePlayers={};conn=null;});}
function sendPos(){if(!conn||!conn.open||!window.GS)return;conn.send({type:'pos',id:myId,x:window.GS.pC.x,y:window.GS.pC.y,hp:window.GS.pHP,facing:window.GS.pFacing});}
function sendBlock(tx,ty,bt){if(!conn||!conn.open)return;conn.send({type:'block',tx,ty,bt});}
function drawOnlinePlayer(op){const g=op.gfx;g.clear();const f=op.facing||1,x=op.x||0,y=op.y||0;g.setPosition(x,y);g.fillStyle(0xff8888);g.fillRect(-6,-4,12,12);g.fillStyle(0xffcc88);g.fillRect(-5,-16,10,11);g.fillStyle(0x3a1800);g.fillRect(-5,-16,10,4);g.scaleX=f;if(op.nametag)op.nametag.setPosition(x-12,y-24);}
function openOnlinePanel(){document.getElementById('onlinePanel').style.display='block';if(!peer)initPeer();}
function closeOnlinePanel(){document.getElementById('onlinePanel').style.display='none';}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;touch-action:none;width:100%!important;height:100%!important;}
#craftPanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d1a0d;border:2px solid #3a7a3a;border-radius:10px;padding:16px;z-index:15000;font-family:"Courier New",monospace;min-width:270px;max-width:92vw;max-height:80vh;overflow-y:auto;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a3a1a;border:1px solid #3a7a3a;color:#aaffaa;padding:6px 14px;border-radius:6px;font-family:"Courier New",monospace;font-size:12px;z-index:30000;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}
#musicBtn{position:fixed;top:6px;right:6px;z-index:10000;padding:4px 9px;background:rgba(0,0,0,0.65);border:1px solid #4a8a4a;color:#aaffaa;font-family:"Courier New",monospace;font-size:11px;border-radius:5px;cursor:pointer;}
#craftBtnUI{position:fixed;top:6px;right:68px;z-index:10000;padding:4px 9px;background:rgba(0,0,0,0.65);border:1px solid #8a6a2a;color:#ffcc88;font-family:"Courier New",monospace;font-size:11px;border-radius:5px;cursor:pointer;}

.mBtn.pressed{transform:scale(0.84);opacity:0.6;}
#btnJump{right:14px;bottom:100px;width:62px;height:62px;background:rgba(40,160,40,0.6);font-size:22px;}
#btnMine{right:88px;bottom:18px;width:56px;height:56px;background:rgba(180,120,20,0.65);}

</style>

<body>
<div id="craftPanel">
  <h3>⚒ Crafting</h3>
  <div id="recipeList"></div>
  <button id="cpClose" onclick="closeCraft()">✕ CLOSE</button>
</div>
<div id="onlinePanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d1a2a;border:2px solid #3a6aaa;border-radius:10px;padding:18px;z-index:15000;font-family:'Courier New',monospace;min-width:280px;max-width:92vw;">
  <h3 style="color:#FFD700;text-align:center;margin-bottom:12px;">🌐 Online Multiplayer</h3>
  <div id="myIdTxt" style="color:#88aaff;font-size:12px;margin-bottom:10px;word-break:break-all;">Loading ID...</div>
  <div style="color:#aaa;font-size:11px;margin-bottom:6px;">Share your ID with friend, or enter their ID:</div>
  <input id="peerIdInput" placeholder="Enter friend's ID..." style="width:100%;padding:6px;background:#1a2a3a;border:1px solid #3a6aaa;color:#fff;font-family:'Courier New',monospace;font-size:12px;border-radius:4px;margin-bottom:8px;">
  <button onclick="connectTo()" style="width:100%;padding:7px;background:#1a3a5a;border:1px solid #3a7aaa;color:#aaccff;font-family:'Courier New',monospace;font-size:13px;border-radius:5px;cursor:pointer;margin-bottom:6px;">🔗 Connect to Friend</button>
  <div style="color:#668866;font-size:10px;margin-bottom:8px;">Both players see the same world. Host starts the game first!</div>
  <button onclick="closeOnlinePanel()" style="width:100%;padding:6px;background:#3a1a1a;border:1px solid #aa3a3a;color:#ffaaaa;font-family:'Courier New',monospace;font-size:12px;border-radius:5px;cursor:pointer;">✕ Close</button>
</div>
<div id="toast"></div>
<button id="musicBtn" onclick="toggleMusic()">♪ ON</button>
<button id="craftBtnUI" onclick="toggleCraft()">⚒ Craft</button>
<button id="onlineBtnUI" onclick="openOnlinePanel()" style="position:fixed;top:6px;right:140px;z-index:10000;padding:4px 9px;background:rgba(0,0,0,0.65);border:1px solid #3a6aaa;color:#aaccff;font-family:'Courier New',monospace;font-size:11px;border-radius:5px;cursor:pointer;">🌐 Online</button>
<div id="mobileHUD">
  <div id="joyZone"><div id="joyKnob"></div></div>
  <div class="mBtn" id="btnJump">↑</div>
  <div class="mBtn" id="btnMine">⛏</div>
  <div class="mBtn" id="btnAtk">⚔</div>
  <div class="mBtn" id="btnPlace">□</div>
  <div class="mBtn" id="btnCraft">⚒</div>
</div>
<script>
const TS=16,WW=400,WH=200;
const T={AIR:0,GRASS:1,DIRT:2,STONE:3,WOOD:4,LEAVES:5,COAL:6,IRON:7,SAND:8,WATER:9,BEDROCK:10,TORCH:11,PLANK:12};
const TC={1:{a:0x5d8a3c,b:0x3d6a1c},2:{a:0xa07840,b:0x7a5820},3:{a:0x909090,b:0x686868},4:{a:0xa06030,b:0x784820},5:{a:0x3a8a2a,b:0x1a5a0a},6:{a:0x606060,b:0x333333},7:{a:0x909090,b:0xcc8844},8:{a:0xd0c080,b:0xa89840},9:{a:0x2060cc,b:0x1040aa},10:{a:0x303030,b:0x181818},11:{a:0xff9900,b:0xff5500},12:{a:0xb07840,b:0x805820}};
const THP={1:2,2:3,3:8,4:5,5:1,6:10,7:12,8:2,9:9999,10:9999,11:1,12:4};
const TDROP={1:'dirt',2:'dirt',3:'stone',4:'wood',5:null,6:'coal',7:'iron',8:'sand',11:'torch',12:'plank'};
const ITEMS={
  pickaxe:{name:'Pickaxe',color:0xcccccc,isBlock:false,spd:5.5,dmg:8},
  ironpick:{name:'Iron Pick',color:0xddaa55,isBlock:false,spd:9,dmg:15},
  sword:{name:'Sword',color:0x4488ff,isBlock:false,dmg:25},
  ironsword:{name:'Iron Sword',color:0xddaa55,isBlock:false,dmg:50},
  dirt:{name:'Dirt',color:0xa07840,isBlock:true,tile:2},
  stone:{name:'Stone',color:0x909090,isBlock:true,tile:3},
  wood:{name:'Wood',color:0xa06030,isBlock:true,tile:4},
  plank:{name:'Plank',color:0xb07840,isBlock:true,tile:12},
  coal:{name:'Coal',color:0x444444,isBlock:false},
  iron:{name:'Iron',color:0xcc8844,isBlock:false},
  sand:{name:'Sand',color:0xd0c080,isBlock:true,tile:8},
  leaves:{name:'Leaves',color:0x3a8a2a,isBlock:true,tile:5},
  torch:{name:'Torch',color:0xff9900,isBlock:true,tile:11},
  ironbar:{name:'Iron Bar',color:0xddaa77,isBlock:false},
  meat:{name:'Raw Meat',color:0xdd6644,isBlock:false,heal:20},
  cookedmeat:{name:'Cooked Meat',color:0xcc4422,isBlock:false,heal:50},
  bandage:{name:'Bandage',color:0xffaaaa,isBlock:false,heal:35},
};
const RECIPES=[
  {r:'plank',n:4,need:{wood:1},label:'Plank x4',req:'wood x1'},
  {r:'torch',n:4,need:{wood:1,coal:1},label:'Torch x4',req:'wood+coal'},
  {r:'ironbar',n:1,need:{iron:3},label:'Iron Bar',req:'iron x3'},
  {r:'ironpick',n:1,need:{ironbar:3,wood:2},label:'Iron Pick',req:'bar x3+wood x2'},
  {r:'ironsword',n:1,need:{ironbar:4,wood:1},label:'Iron Sword',req:'bar x4+wood x1'},
  {r:'bandage',n:2,need:{plank:4},label:'Bandage x2',req:'plank x4'},
  {r:'cookedmeat',n:1,need:{meat:1,coal:1},label:'Cooked Meat',req:'meat+coal'},
];
function lerp(a,b,t){return a+(b-a)*t;}
function rgb(r,g,b){return((r&255)<<16)|((g&255)<<8)|(b&255);}
const IS_MOBILE=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||('ontouchstart' in window);
function showToast(m,dur){dur=dur||2500;const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',dur);}

// CRAFT
let craftOpen=false;
function toggleCraft(){craftOpen?closeCraft():openCraft();}
function openCraft(){
craftOpen=true;
const sc=window.GS,list=document.getElementById(‘recipeList’);list.innerHTML=’’;
RECIPES.forEach((r,i)=>{
const can=sc?Object.entries(r.need).every(([k,v])=>{const s=sc.slots.find(s=>s&&s.type===k);return s&&s.count>=v;}):false;
const d=document.createElement(‘div’);d.className=‘cR’;
d.innerHTML=`<div><div class="cRn">${r.label}</div><div class="cRr">${r.req}</div></div><button class="cRb" ${can?'':'disabled style="opacity:.35"'} onclick="doCraft(${i})">Craft</button>`;
list.appendChild(d);
});
document.getElementById(‘craftPanel’).style.display=‘block’;
}
function closeCraft(){craftOpen=false;document.getElementById(‘craftPanel’).style.display=‘none’;}
function doCraft(i){
const sc=window.GS,r=RECIPES[i];if(!sc)return;
const can=Object.entries(r.need).every(([k,v])=>{const s=sc.slots.find(s=>s&&s.type===k);return s&&s.count>=v;});
if(!can){showToast(‘Not enough materials!’);return;}
Object.entries(r.need).forEach(([k,v])=>sc.removeItem(k,v));
sc.addItem(r.r,r.n);sc.refreshHB();showToast(‘Crafted: ‘+r.label+’!’);openCraft();
}

// MUSIC
let audioCtx=null,musicOn=true,musicInterval=null,musicNodes=[];
const MA=[‘E4’,‘D4’,‘C4’,‘D4’,‘E4’,‘E4’,‘E4’,‘R’,‘D4’,‘D4’,‘D4’,‘R’,‘E4’,‘G4’,‘G4’,‘R’,‘E4’,‘D4’,‘C4’,‘D4’,‘E4’,‘E4’,‘E4’,‘E4’,‘D4’,‘D4’,‘E4’,‘D4’,‘C4’,‘R’,‘R’,‘R’];
const MB=[‘C4’,‘E4’,‘G4’,‘E4’,‘C4’,‘G3’,‘A3’,‘B3’,‘C4’,‘E4’,‘G4’,‘A4’,‘G4’,‘E4’,‘D4’,‘C4’,‘F3’,‘A3’,‘C4’,‘E4’,‘D4’,‘B3’,‘G3’,‘E3’,‘C3’,‘E3’,‘G3’,‘C4’,‘B3’,‘G3’,‘E3’,‘C3’];
const BA=[‘C3’,‘R’,‘G2’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘F2’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘D3’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘F2’,‘R’,‘G2’,‘R’,‘C2’,‘R’,‘R’,‘R’];
const BB=[‘C2’,‘R’,‘G2’,‘R’,‘F2’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘D3’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘F2’,‘R’,‘C3’,‘R’,‘G2’,‘R’,‘D3’,‘R’,‘C2’,‘R’,‘G2’,‘R’,‘C3’,‘R’,‘G2’,‘R’];
function nF(n){if(n===‘R’)return 0;const nm={C:0,D:2,E:4,F:5,G:7,A:9,B:11};const o=parseInt(n.slice(-1)),s=nm[n[0]];return 440*Math.pow(2,(s-9+(o-4)*12)/12);}
function startMusic(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state===‘suspended’)audioCtx.resume();stopMusic();const bs=60/110;let mi=0,bi=0,mt=0,bt=0;const master=audioCtx.createGain();master.gain.value=0.18;master.connect(audioCtx.destination);musicNodes.push(master);const M=[MA,MB],B=[BA,BB];function play(f,d,tp,v){if(!f||!musicOn)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d*.88);o.connect(g);g.connect(master);o.start();o.stop(audioCtx.currentTime+d);musicNodes.push(o,g);}function tick(){if(!musicOn)return;play(nF(M[mt][mi]),bs*.85,‘square’,0.15);play(nF(B[bt][bi]),bs*.9,‘sawtooth’,0.1);if(nF(M[mt][mi])&&Math.random()<.25)play(nF(M[mt][mi])*1.5,bs*.6,‘triangle’,0.05);mi=(mi+1)%M[mt].length;bi=(bi+1)%B[bt].length;if(mi===0)mt=(mt+1)%M.length;if(bi===0)bt=(bt+1)%B.length;}tick();musicInterval=setInterval(tick,bs*1000);}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null;}musicNodes.forEach(n=>{try{if(n.stop)n.stop();n.disconnect();}catch(e){}});musicNodes=[];}
function toggleMusic(){musicOn=!musicOn;document.getElementById(‘musicBtn’).textContent=’♪ ’+(musicOn?‘ON’:‘OFF’);if(musicOn)startMusic();else stopMusic();}
let _ms=false;function tryM(){if(!_ms&&musicOn){_ms=true;startMusic();}}
[‘pointerdown’,‘touchstart’,‘keydown’].forEach(e=>document.addEventListener(e,tryM,{once:true}));

// WORLD GEN
function genWorld(){
const map=[];for(let x=0;x<WW;x++)map[x]=new Array(WH).fill(0);
const surf=[];for(let x=0;x<WW;x++)surf[x]=Math.round(75+Math.sin(x*.028)*10+Math.sin(x*.07+1.1)*5+Math.sin(x*.18+2.3)*3+Math.sin(x*.4+.7)*1.5);
for(let x=0;x<WW;x++)for(let y=0;y<WH;y++){if(y>=WH-1){map[x][y]=10;continue;}if(y>surf[x]+25)map[x][y]=3;else if(y>surf[x])map[x][y]=2;else if(y===surf[x])map[x][y]=1;}
for(let i=0;i<42;i++){let cx=(Math.random()*WW)|0,cy=(surf[cx]+15+Math.random()*65)|0,ang=Math.random()*Math.PI*2;for(let j=0,len=40+Math.random()*100;j<len;j++){ang+=(Math.random()-.5)*.9;cx+=Math.cos(ang);cy+=Math.sin(ang)*.6;const r=2+Math.random()*3;for(let dx=-r-1;dx<=r+1;dx++)for(let dy=-r-1;dy<=r+1;dy++){if(dx*dx+dy*dy>r*r)continue;const nx=(cx+dx)|0,ny=(cy+dy)|0;if(nx>1&&nx<WW-2&&ny>5&&ny<WH-2&&map[nx][ny]!==10)map[nx][ny]=0;}}}
for(let i=0;i<380;i++){const x=(1+Math.random()*(WW-2))|0,y=(surf[x]+10+Math.random()*(WH-surf[x]-15))|0;const ore=Math.random()<.6?6:7;for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){const nx=x+dx,ny=y+dy;if(nx>0&&nx<WW&&ny>0&&ny<WH&&map[nx][ny]===3&&Math.random()<.7)map[nx][ny]=ore;}}
for(let x=5;x<WW-5;x++){if(Math.random()<.08&&map[x][surf[x]]===1&&Math.abs(surf[x]-surf[x-1])<=2&&Math.abs(surf[x]-surf[x+1])<=2){const h=5+((Math.random()*4)|0);for(let y=surf[x]-h;y<surf[x];y++)if(y>=0)map[x][y]=4;const lr=3+(Math.random()*2|0),lt=surf[x]-h-1;for(let dx=-lr;dx<=lr;dx++)for(let dy=-lr;dy<=lr;dy++){if(dx*dx*.6+dy*dy>lr*lr+1)continue;const lx=x+dx,ly=lt+dy;if(lx>0&&lx<WW&&ly>0&&ly<WH&&map[lx][ly]===0)map[lx][ly]=5;}}}
for(let x=0;x<WW;x++)if(surf[x]>82)for(let y=surf[x];y<Math.min(WH-1,surf[x]+6);y++)if([2,1,3].includes(map[x][y]))map[x][y]=8;
return{map,surf};
}

// MOBILE
const joy={id:null,dx:0,dy:0};
const mBtns={jump:false,atk:false,mine:false,place:false};
function setupMobile(){
if(!IS_MOBILE)return;
// Don’t show HUD yet — shown only when game starts
const zone=document.getElementById(‘joyZone’),knob=document.getElementById(‘joyKnob’),MR=42;
function mv(id,cx,cy){if(joy.id!==id)return;const r=zone.getBoundingClientRect(),ox=r.left+r.width/2,oy=r.top+r.height/2;let dx=cx-ox,dy=cy-oy;const d=Math.sqrt(dx*dx+dy*dy);if(d>MR){dx=dx/d*MR;dy=dy/d*MR;}joy.dx=dx/MR;joy.dy=dy/MR;knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}
zone.addEventListener(‘touchstart’,e=>{e.preventDefault();const t=e.changedTouches[0];joy.id=t.identifier;mv(t.identifier,t.clientX,t.clientY);},{passive:false});
zone.addEventListener(‘touchmove’,e=>{e.preventDefault();for(const t of e.changedTouches)mv(t.identifier,t.clientX,t.clientY);},{passive:false});
zone.addEventListener(‘touchend’,e=>{for(const t of e.changedTouches)if(t.identifier===joy.id){joy.id=null;joy.dx=0;joy.dy=0;knob.style.transform=‘translate(-50%,-50%)’;}});
function btn(id,k){const el=document.getElementById(id);el.addEventListener(‘touchstart’,e=>{e.preventDefault();mBtns[k]=true;el.classList.add(‘pressed’);},{passive:false});el.addEventListener(‘touchend’,()=>{mBtns[k]=false;el.classList.remove(‘pressed’);});el.addEventListener(‘touchcancel’,()=>{mBtns[k]=false;el.classList.remove(‘pressed’);});}
btn(‘btnJump’,‘jump’);btn(‘btnAtk’,‘atk’);btn(‘btnMine’,‘mine’);btn(‘btnPlace’,‘place’);
document.getElementById(‘btnCraft’).addEventListener(‘touchstart’,e=>{e.preventDefault();toggleCraft();},{passive:false});
}
setupMobile();

/* MENU */
class MenuScene extends Phaser.Scene{
constructor(){super(‘Menu’);}
create(){
tryM();
if(IS_MOBILE)document.getElementById(‘mobileHUD’).classList.remove(‘visible’);
const W=this.scale.width,H=this.scale.height;
const sky=this.add.graphics();sky.fillGradientStyle(0x0a1040,0x0a1040,0x1a3a8a,0x1a3a8a,1);sky.fillRect(0,0,W,H);

// LMB: mine or attack at cursor position
startLMB(wx,wy){
const item=this.selItem();

// FIXED FOOD/BANDAGE use
useFood(){
const item=this.selItem();
if(!item){showToast(‘No item selected!’);return;}
if(!item.heal){showToast(item.name+’ is not food!’);return;}
if(this.pHP>=this.pMaxHP){showToast(‘HP is already full!’);return;}
const healed=Math.min(item.heal,this.pMaxHP-this.pHP);
this.pHP=Math.min(this.pMaxHP,this.pHP+item.heal);
this.removeItem(item.type,1);this.refreshHB();
showToast(`Used ${item.name}: +${healed} HP! ❤️`);
}

updateDayNight(dt){
this.dayT+=dt;const dp=this.dayT/this.dayDur;
const wasNight=this.isNight;
// Day = 0..0.571 (4min), Night = 0.571..1.0 (3min)
this.isNight=(dp>=0.571&&dp<1.0);
if(this.isNight&&!wasNight){
this.waveNum=0;this.waveTimer=0;
if(this.dayNum===1)showToast(‘🌙 Night 1 — Safe tonight!’,4000);
else{showToast(`🌙 Night ${this.dayNum} — WAVES INCOMING!`,3000);this.time.delayedCall(3000,()=>this.spawnWave());}
}
if(!this.isNight&&wasNight&&this.dayT>this.dayDur*0.05){
this.dayNum++;this.dayT=0;this.waveActive=false;
showToast(`☀️ Day ${this.dayNum} — You survived!`,3000);
if(this.animals.length<8)this.spawnAnimals();
}
if(this.isNight&&this.dayNum>=2){
this.waveTimer+=dt;
if(this.waveTimer>=this.waveCooldown&&!this.waveActive){this.waveTimer=0;this.spawnWave();}
}
// Map to sky gradient 0..1
const skyDp=dp<0.571?dp/0.571*0.5:0.5+(dp-0.571)/0.429*0.5;
this.drawSky(skyDp);
const ov=this.nightOvl;ov.clear();
let na=0;
if(skyDp>.45&&skyDp<.55)na=((skyDp-.45)/.1)*.75;
else if(skyDp>=.55&&skyDp<.9)na=.75;
else if(skyDp>=.9&&skyDp<1)na=((1-skyDp)/.1)*.75;
if(na>0){ov.fillStyle(0x000028,na);ov.fillRect(0,0,this.scale.width,this.scale.height);}
const phase=this.isNight?‘🌙’:‘☀️’;
this.dayText.setText(`${phase} Day ${this.dayNum}`);
if(this.isNight&&this.dayNum>=2&&this.waveActive){this.waveText.setText(`⚠️ WAVE ${this.waveNum}!`);this.waveText.setAlpha(.5+Math.sin(Date.now()*.005)*.5);}
else if(this.isNight&&this.dayNum>=2){const t=Math.max(0,Math.ceil((this.waveCooldown-this.waveTimer)/1000));this.waveText.setText(t>0?`Next wave: ${t}s`:’’);this.waveText.setAlpha(1);}
else this.waveText.setText(’’);
}

spawnWave(){
this.waveNum++;this.waveActive=true;
const count=Math.min(3+this.dayNum*2+this.waveNum*2,20);
showToast(`⚠️ WAVE ${this.waveNum}! (${count} enemies)`,3000);
for(let i=0;i<count;i++){
this.time.delayedCall(i*600,()=>{
const side=Math.random()<.5?-1:1;
const sx=Math.max(10,Math.min(WW*TS-10,this.pC.x+side*(280+Math.random()*200)))|0;
const sy=this.surf[Math.floor(sx/TS)]||80;
// Only night mobs: zombie, creeper, spider
const r=Math.random();
let type;
if(this.dayNum<=2)type=r<.5?‘zombie’:r<.8?‘creeper’:‘spider’;
else type=r<.4?‘zombie’:r<.7?‘creeper’:‘spider’;
this.mobs.push(new Mob(this,sx,(sy-2)*TS,type));
});
}
this.time.delayedCall(count*600+5000,()=>this.waveActive=false);
}

spawnAnimals(){for(let i=0;i<10;i++){const x=(20+Math.random()*(WW-40))|0;this.animals.push(new Animal(this,x*TS,(this.surf[x]-1)*TS,Math.random()<.6?‘rabbit’:‘deer’));}}

attackAnimal(wx,wy){
if(this.atkCD>0)return false;
let hit=false;
this.animals.forEach(a=>{if(!a.alive)return;const dx=a.cont.x-this.pC.x,dy=a.cont.y-this.pC.y;if(Math.sqrt(dx*dx+dy*dy)<70){a.takeDamage(this.selItem()?.dmg||20);hit=true;this.hitFX(a.cont.x,a.cont.y);}});
if(hit){this.atkCD=350;this.atkFlash=8;}
return hit;
}

buildBg(){
const sy=75*TS;
const g=this.bgMtn;g.clear();g.fillStyle(0x1a3a1a,.6);g.beginPath();g.moveTo(0,sy);
for(let x=0;x<=WW*TS;){const w=120+((x*7)%190),h=90+((x*3)%210);g.lineTo(x+w/2,sy-h);g.lineTo(x+w,sy);x+=w*.65;}
g.closePath();g.fillPath();
const t=this.bgBTr;t.clear();
for(let x=0;x<WW*TS;x+=24+((x*7)%42)){const h=38+((x*3)%62),w=18+((x*5)%32);t.fillStyle(0x0a2a0a,.55);t.fillTriangle(x,sy,x+w/2,sy-h,x+w,sy);}
for(let i=0;i<20;i++){const cg=this.add.graphics().setScrollFactor(.6+Math.random()*.15).setDepth(-60);const cx=Math.random()*WW*TS,cy=25+Math.random()*200,cw=55+Math.random()*85;this.drawCloud(cg,cx,cy,cw);this.clouds.push({gfx:cg,x:cx,y:cy,w:cw,spd:.07+Math.random()*.18});}

}
drawSky(d){
const g=this.bgSky,W=this.scale.width,H=this.scale.height;g.clear();
let tR,tG,tB,bR,bG,bB;
if(d<.1){const t=d/.1;tR=lerp(10,100,t);tG=lerp(10,160,t);tB=lerp(50,220,t);bR=lerp(20,180,t);bG=lerp(30,220,t);bB=lerp(80,255,t);}
else if(d<.45){tR=100;tG=160;tB=220;bR=180;bG=220;bB=255;}
else if(d<.55){const t=(d-.45)/.1;tR=lerp(100,40,t);tG=lerp(160,50,t);tB=lerp(220,80,t);bR=lerp(180,220,t);bG=lerp(220,120,t);bB=lerp(255,60,t);}
else if(d<.65){const t=(d-.55)/.1;tR=lerp(40,5,t);tG=lerp(50,5,t);tB=lerp(80,30,t);bR=lerp(220,10,t);bG=lerp(120,20,t);bB=lerp(60,60,t);}
else if(d<.8){tR=5;tG=5;tB=30;bR=10;bG=20;bB=60;}
else{const t=(d-.8)/.05;tR=lerp(5,80,t);tG=lerp(5,100,t);tB=lerp(30,180,t);bR=lerp(10,160,t);bG=lerp(20,200,t);bB=lerp(60,255,t);}
g.fillGradientStyle(rgb(tR,tG,tB),rgb(tR,tG,tB),rgb(bR,bG,bB),rgb(bR,bG,bB),1);g.fillRect(0,0,W,H);
if(d>.55||d<.05){const a=d<.05?d/.05:d>.8?(d-.8)/.05:1;if(a>0)for(let i=0;i<80;i++){g.fillStyle(0xffffff,(.3+(i%3)*.2)*a);g.fillRect((i*137+71)%W,(i*91+43)%(H*.72),i%5===0?2:1,i%5===0?2:1);}}
const ang=d*Math.PI*2-Math.PI/2,cx=W/2+Math.cos(ang)*W*.42,cy=H*.4+Math.sin(ang)*H*.38;
if(d<.45||d>.85){g.fillStyle(0xFFEE44,1);g.fillCircle(cx,cy,22);g.fillStyle(0xFFEE44,.22);g.fillCircle(cx,cy,36);}
else if(d>.5&&d<.8){g.fillStyle(0xdde8ff,.9);g.fillCircle(cx,cy,16);g.fillStyle(rgb(tR,tG,tB),.95);g.fillCircle(cx+7,cy-4,13);}
}
drawCloud(g,x,y,w){g.clear();const h=w*.45;g.fillStyle(0xffffff,.72);g.fillEllipse(x,y,w,h);g.fillEllipse(x+w*.25,y-h*.35,w*.7,h*.7);g.fillEllipse(x-w*.2,y-h*.2,w*.55,h*.55);}
updateTorchLight(){
const g=this.lGfx;g.clear();if(!this.isNight)return;
const cam=this.cameras.main;
const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+2);
const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+2);
for(let x=tx0;x<=tx1;x++)for(let y=ty0;y<=ty1;y++){if(this.map[x][y]===T.TORCH){const px=x*TS+TS/2,py=y*TS+TS/2,fl=1+Math.sin(Date.now()*.008+x+y)*.08;g.fillStyle(0xffaa33,.18*fl);g.fillCircle(px,py,55*fl);g.fillStyle(0xffcc66,.25*fl);g.fillCircle(px,py,30*fl);g.fillStyle(0xffee99,.4*fl);g.fillCircle(px,py,14*fl);}}
g.fillStyle(0xffffff,.04);g.fillCircle(this.pC.x,this.pC.y,44);
}
ck(cx,cy){return`${cx},${cy}`;}
refreshChunks(){
const cam=this.cameras.main;
const tx0=Math.max(0,Math.floor(cam.scrollX/TS)-1),tx1=Math.min(WW-1,Math.ceil((cam.scrollX+cam.width)/TS)+1);
const ty0=Math.max(0,Math.floor(cam.scrollY/TS)-1),ty1=Math.min(WH-1,Math.ceil((cam.scrollY+cam.height)/TS)+1);
const cx0=Math.floor(tx0/this.CS),cx1=Math.floor(tx1/this.CS),cy0=Math.floor(ty0/this.CS),cy1=Math.floor(ty1/this.CS);
const vis=new Set();
for(let cx=cx0;cx<=cx1;cx++)for(let cy=cy0;cy<=cy1;cy++){const k=this.ck(cx,cy);vis.add(k);if(!this.chunks[k]){this.chunks[k]=this.add.graphics().setDepth(10);this.renderChunk(cx,cy);}}
for(const k in this.chunks)if(!vis.has(k)){this.chunks[k].destroy();delete this.chunks[k];}
}
renderChunk(cx,cy){const g=this.chunks[this.ck(cx,cy)];if(!g)return;g.clear();for(let x=cx*this.CS;x<(cx+1)*this.CS&&x<WW;x++)for(let y=cy*this.CS;y<(cy+1)*this.CS&&y<WH;y++){const t=this.map[x][y];if(!t)continue;this.drawTile(g,x,y,t);}}
drawTile(g,x,y,t){
const c=TC[t];if(!c)return;const px=x*TS,py=y*TS;
if(t===T.TORCH){g.fillStyle(0x8B4513);g.fillRect(px+7,py+5,2,9);g.fillStyle(0xff9900);g.fillCircle(px+8,py+5,4);g.fillStyle(0xffff00,.8);g.fillCircle(px+8,py+4,2);return;}
g.fillStyle(c.b);g.fillRect(px,py,TS,TS);g.fillStyle(c.a);g.fillRect(px,py,TS-2,TS-2);
if(t===1){g.fillStyle(0x4aaa28);g.fillRect(px,py,TS,3);g.fillStyle(0x70cc40);for(let i=2;i<TS;i+=3)g.fillRect(px+i,py,1,2);}
else if(t===6){g.fillStyle(0x222222);g.fillRect(px+3,py+3,4,4);g.fillRect(px+9,py+7,3,3);}
else if(t===7){g.fillStyle(0xcc8844);g.fillRect(px+3,py+3,3,3);g.fillRect(px+9,py+8,3,3);}
else if(t===9){g.fillStyle(0x1a50cc,.8);g.fillRect(px,py,TS,TS);g.fillStyle(0x60a0ff,.4);g.fillRect(px+2,py+3,TS-4,2);}
else if(t===4){g.fillStyle(0x602010);g.fillRect(px+6,py,4,TS);}
else if(t===5){g.fillStyle(0x285818,.6);g.fillRect(px+2,py+2,4,4);g.fillRect(px+9,py+6,4,4);}
else if(t===12){g.fillStyle(0x704020,.6);g.fillRect(px,py+5,TS,2);g.fillRect(px,py+11,TS,2);g.fillRect(px+8,py,2,TS);}
g.fillStyle(0x000000,.18);g.fillRect(px+TS-2,py,2,TS);g.fillRect(px,py+TS-2,TS,2);
}
invChunk(tx,ty){const k=this.ck(Math.floor(tx/this.CS),Math.floor(ty/this.CS));if(this.chunks[k])this.renderChunk(Math.floor(tx/this.CS),Math.floor(ty/this.CS));}
drawPlayer(){
const g=this.pG;g.clear();const f=this.pFacing,t=Date.now(),run=this.pState===‘run’,ls=run?Math.sin(t*.013):0;
g.fillStyle(0x000000,.18);g.fillEllipse(0,17,18,5);
g.fillStyle(0x5a3010);g.fillRect(f>0?0:-6,13,5,4+ls*3);g.fillRect(f>0?-6:0,13,5,4-ls*3);
g.fillStyle(0x1a3a7a);g.fillRect(f>0?0:-6,7,5,7+ls*2);g.fillRect(f>0?-6:0,7,5,7-ls*2);
g.fillStyle(0x2a6a2a);g.fillRect(-6,-4,12,12);g.fillStyle(0x1a4a1a);g.fillRect(-6,3,12,2);
const ms=this.mT?Math.sin(t*.025)*16:0;
g.fillStyle(0x2a6a2a);g.fillRect(f>0?-9:5,-3,4,10);g.fillRect(f>0?5:-9,-3+ms*.12,4,10);
g.fillStyle(0xffcc88);g.fillRect(-5,-16,10,11);g.fillStyle(0x3a1800);g.fillRect(-5,-16,10,4);

refreshHB(){
const g=this.hbGfx;g.clear();const H=this.scale.height;
for(let i=0;i<9;i++){
const x=4+i*46,y=H-54,w=40,h=40,sel=i===this.sel;
g.fillStyle(sel?0x2a5a2a:0x101810,.92);g.fillRoundedRect(x,y,w,h,5);
g.lineStyle(sel?2:1,sel?0x6eff6e:0x3a5a3a);g.strokeRoundedRect(x,y,w,h,5);
if(sel){g.lineStyle(1,0x5aff5a,.4);g.strokeRoundedRect(x+2,y+2,w-4,h-4,3);}
g.fillStyle(0xffffff,.04);g.fillRoundedRect(x+1,y+1,w-2,4,3);
const s=this.slots[i];if(s){g.fillStyle(s.color||0xaaaaaa);g.fillRect(x+12,y+8,16,16);g.fillStyle(0xffffff,.35);g.fillRect(x+12,y+8,7,5);}
this.hbNums[i].setText(String(i+1)).setPosition(x+3,y+2);

for(let i=0;i<max;i++){const hx=8+i*22,hy=8;if(i<full){hg.fillStyle(0xff2244,.9);this.dH(hg,hx,hy,8);}else if(i===full&&part>0){hg.fillStyle(0x441122,.6);this.dH(hg,hx,hy,8);hg.fillStyle(0xff2244,.9);this.dH(hg,hx,hy,8*part);}else{hg.fillStyle(0x441122,.6);this.dH(hg,hx,hy,8);}}

else this.waveText.setText(’’);

dH(g,x,y,s){const r=Math.max(1,Math.round(s));g.fillRect(x-r,y-r+2,r,r);g.fillRect(x+1,y-r+2,r,r);g.fillRect(x-r-1,y-r+3,r*3+2,r);g.fillRect(x-r,y-r+4,r*3,r);g.fillRect(x-r+1,y-r+5,r*3-2,r);if(r>2){g.fillRect(x-r+2,y-r+6,r*3-4,r);g.fillRect(x,y-r+7,r,r);}}

update(time,dt){
if(this.paused||craftOpen)return;
if(this.atkCD>0)this.atkCD=Math.max(0,this.atkCD-dt);if(this.placeCD>0)this.placeCD=Math.max(0,this.placeCD-dt);if(this.pInv>0)this.pInv=Math.max(0,this.pInv-dt);
this.updateDayNight(dt);
this.clouds.forEach(c=>{c.x+=c.spd;if(c.x>WW*TS+200)c.x=-200;this.drawCloud(c.gfx,c.x,c.y,c.w);});
this.updateTorchLight();
this.regenT=(this.regenT||0)+dt;if(this.regenT>3500&&this.pHP<this.pMaxHP&&this.pInv<=0){this.pHP=Math.min(this.pMaxHP,this.pHP+1);this.regenT=0;}
const K=this.keys;
const ml=(K.L?.isDown||K.A?.isDown)||(joy.dx<-.3);
const mr=(K.R?.isDown||K.D?.isDown)||(joy.dx>.3);
if(ml){this.pVx=-3.2;this.pFacing=-1;this.pState=‘run’;}else if(mr){this.pVx=3.2;this.pFacing=1;this.pState=‘run’;}else{this.pVx*=.72;if(Math.abs(this.pVx)<.1)this.pState=‘idle’;}
if(((K.SP?.isDown||K.W?.isDown)||mBtns.jump)&&this.pOnGround){this.pVy=-7.5;this.pOnGround=false;this.pState=‘jump’;if(this.landedOnce)this.fallStartY=this.pC.y;}
// While rising — update fallStartY so we measure from highest point
if(!this.pOnGround&&this.pVy<0&&this.landedOnce)this.fallStartY=this.pC.y;
this.pVy=Math.min(this.pVy+.45,16);
const nx=this.pC.x+this.pVx;if(!this.collides(nx,this.pC.y))this.pC.x=Phaser.Math.Clamp(nx,8,WW*TS-8);else this.pVx=0;
const ny=this.pC.y+this.pVy;this.pOnGround=false;
if(!this.collides(this.pC.x,ny))this.pC.y=ny;
else{
// Only check fall damage after player has landed once (not on spawn)
if(this.landedOnce&&this.fallStartY!==null&&this.pVy>0){
const fallDist=Math.round((this.pC.y-this.fallStartY)/TS);
if(fallDist>10){
const fd=Math.round((fallDist-10)*6);
if(fd>0){this.pHP=Math.max(1,this.pHP-fd);this.pInv=400;this.regenT=0;showToast(`💥 Fell ${fallDist} blocks! -${fd}HP`);}
}
}
if(this.pVy>0){
this.pOnGround=true;
this.landedOnce=true; // mark first landing
this.fallStartY=this.pC.y;
}
this.pVy=0;
while(this.collides(this.pC.x,this.pC.y-1))this.pC.y-=1;
}
if(mBtns.atk&&this.atkCD<=0){if(!this.doAttack())this.attackAnimal(this.pC.x+this.pFacing*50,this.pC.y);}
if(mBtns.mine&&!this.mT){const fx=this.pC.x+this.pFacing*TS*1.5,fy=this.pC.y;const tx=Math.floor(fx/TS),ty=Math.floor(fy/TS);for(const[bx,by]of[[tx,ty],[tx,ty+1],[tx,ty-1],[tx+this.pFacing,ty]]){if(this.canMine(bx,by)){this.mT={tx:bx,ty:by};this.mProg=0;break;}}}
if(!mBtns.mine&&!this.lmbDown&&this.mT){this.mT=null;this.mProg=0;}
if(this.lmbDown&&!this.mT){const tx=Math.floor(this.pwx/TS),ty=Math.floor(this.pwy/TS);const item=this.selItem();if(!(item&&(item.type===‘sword’||item.type===‘ironsword’))&&this.canMine(tx,ty)){this.mT={tx,ty};this.mProg=0;}}
if(this.rmbDown&&this.placeCD<=0)this.doPlace(this.cursorTX,this.cursorTY);
// Mobile place — place at last touched world position
if(mBtns.place&&this.placeCD<=0)this.doPlace(this.cursorTX,this.cursorTY);
this.drawPlayer();this.updateMining(dt);this.updatePlacePreview();this.updateDrops(dt);this.updateWeapon();this.refreshChunks();this.refreshHB();
// Sync position online
if(Date.now()%(100)<20)sendPos();
this.mobs.forEach(m=>m.update(dt,this.pC.x,this.pC.y));
this.mobs.forEach(m=>{if(!m.alive||m.dmgCD>0||this.pInv>0)return;const dx=m.cont.x-this.pC.x,dy=m.cont.y-this.pC.y;if(dx*dx+dy*dy<22*22){this.pHP=Math.max(0,this.pHP-m.dmg);m.dmgCD=900;this.pInv=600;this.regenT=0;if(this.pHP<=0)this.die();}});
for(let i=this.mobs.length-1;i>=0;i–)if(!this.mobs[i].alive&&this.mobs[i].dead){this.mobs[i].cont.destroy();this.mobs.splice(i,1);}
this.animals.forEach(a=>a.update(dt));
for(let i=this.animals.length-1;i>=0;i–)if(!this.animals[i].alive&&this.animals[i].dead){this.animals[i].cont.destroy();this.animals.splice(i,1);}
}
die(){showToast(`💀 Died on Day ${this.dayNum}!`,4000);this.cameras.main.fadeOut(1000,180,0,0);this.time.delayedCall(1400,()=>this.scene.start(‘Menu’));}
}

/* MOB */
class Mob{
constructor(scene,x,y,type){

// Line-of-sight check — returns true if can see player (no solid blocks between)
hasLOS(px,py){

const dx=px-x0,dy=py-y0;
const steps=Math.max(Math.abs(dx),Math.abs(dy))/TS;
if(steps<1)return true;
for(let i=1;i<steps;i++){
const tx=Math.floor((x0+dx*(i/steps))/TS);
const ty=Math.floor((y0+dy*(i/steps))/TS);
if(this.solid(tx,ty))return false;

return true;
}

}

explode(){
if(this.exploded)return;
this.exploded=true;this.alive=false;
const sc=this.sc;
// Big explosion FX
for(let i=0;i<20;i++){sc.breakFX(this.cont.x+(Math.random()-.5)*40,this.cont.y+(Math.random()-.5)*40,{a:0xff8800,b:0xff4400});}
// Destroy nearby blocks (radius 3)
const cx=Math.floor(this.cont.x/TS),cy=Math.floor(this.cont.y/TS);
for(let dx=-3;dx<=3;dx++)for(let dy=-3;dy<=3;dy++){
if(dx*dx+dy*dy>10)continue;
const nx=cx+dx,ny=cy+dy;
if(nx>0&&nx<WW&&ny>0&&ny<WH&&sc.map[nx][ny]!==0&&sc.map[nx][ny]!==10){
sc.map[nx][ny]=0;sc.invChunk(nx,ny);
}
}
// Damage player if close
const pdx=sc.pC.x-this.cont.x,pdy=sc.pC.y-this.cont.y;

if(pdist<3*TS){
const dmg=Math.round(60*(1-pdist/(3*TS)));
sc.pHP=Math.max(1,sc.pHP-dmg);sc.pInv=500;

}
sc.time.delayedCall(100,()=>{this.gfx.clear();this.timerGfx.clear();this.timerTxt.setText(’’);this.dead=true;});
}

g.fillStyle(0x220000);g.fillCircle(this.facing*4,-this.h/2-1-hop,1.5);
}else{

g.fillStyle(this.color);g.fillEllipse(0,0,this.w*1.8,this.h*.7);

g.fillStyle(0x221100);g.fillCircle(this.facing*this.w*.9,-this.h*.4,2);

}

}
update(dt){
if(!this.alive)return;if(this.invCD>0)this.invCD-=dt;this.stateT+=dt;
